// /documents, /checkin, /signals, /nearby, /scan, /chat. No se tocó ningún
// payload ni respuesta. Lo que cambió es la capa de presentación (UI de
// producto + PWA) y que los controles del motor viven en modo dev (?debug=1).
const API = (typeof process !== "undefined" && process.env?.REACT_APP_API_URL)
  || (window.location.hostname === "localhost" || window.location.protocol === "file:"
      ? "http://localhost:8000"
      : window.location.origin);

// ── Sesión: token guardado en localStorage e inyectado en cada request ──
// El backend ahora exige Authorization: Bearer <token> en los endpoints de
// trip. Centralizamos aquí para que TODA llamada lo lleve sin tocar cada caso.
const TOKEN_KEY = "voyra_token";
const tokenStore = {
  get: () => { try { return localStorage.getItem(TOKEN_KEY) || ""; } catch { return ""; } },
  set: (t) => { try { t ? localStorage.setItem(TOKEN_KEY, t) : localStorage.removeItem(TOKEN_KEY); } catch {} },
  clear: () => { try { localStorage.removeItem(TOKEN_KEY); } catch {} },
};

// Cuando una sesión muere (401), avisamos al árbol React para volver al login.
// Se setea desde el componente raíz vía api.onUnauthorized.
let _onUnauthorized = null;

// Error de API con el status accesible (para distinguir 401/403/429 en la UI).
class ApiError extends Error {
  constructor(status, body) {
    let detalle = body;
    try { const j = JSON.parse(body); detalle = j.detail ?? j; } catch {}
    const msg = typeof detalle === "string" ? detalle
      : (detalle && detalle.mensaje) ? detalle.mensaje : `Error ${status}`;
    super(msg);
    this.status = status;
    this.detail = detalle;
  }
}

function authHeaders(extra) {
  const h = { ...(extra || {}) };
  const t = tokenStore.get();
  if (t) h["Authorization"] = `Bearer ${t}`;
  return h;
}

async function handle(r) {
  if (r.status === 401) {
    // Token ausente o expirado: limpiar y mandar a login.
    tokenStore.clear();
    if (_onUnauthorized) _onUnauthorized();
    throw new ApiError(401, await r.text());
  }
  if (!r.ok) throw new ApiError(r.status, await r.text());
  return r.json();
}

const api = {
  onUnauthorized: (fn) => { _onUnauthorized = fn; },
  post: async (path, body) => handle(await fetch(`${API}${path}`, {
    method: "POST",
    headers: authHeaders({ "Content-Type": "application/json" }),
    body: JSON.stringify(body),
  })),
  get: async (path) => handle(await fetch(`${API}${path}`, { headers: authHeaders() })),
  del: async (path) => handle(await fetch(`${API}${path}`, {
    method: "DELETE", headers: authHeaders(),
  })),
  patch: async (path, body) => handle(await fetch(`${API}${path}`, {
    method: "PATCH",
    headers: authHeaders({ "Content-Type": "application/json" }),
    body: JSON.stringify(body),
  })),
};

// ── Web Push (VAPID) ──
// Convierte la clave pública VAPID (base64url) al formato que pide el navegador.
function urlBase64ToUint8Array(base64String) {
  const padding = "=".repeat((4 - (base64String.length % 4)) % 4);
  const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
  const raw = window.atob(base64);
  const arr = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
  return arr;
}

const pushSupported = () =>
  "serviceWorker" in navigator && "PushManager" in window && "Notification" in window;

// Suscribe el navegador y manda la suscripción al backend. Devuelve true si quedó suscrito.
async function activarPush(tripId) {
  if (!pushSupported() || !tripId) return false;
  try {
    const { enabled, public_key } = await api.get("/push/public-key");
    if (!enabled || !public_key) return false;            // backend sin VAPID
    const permiso = await Notification.requestPermission();
    if (permiso !== "granted") return false;
    const reg = await navigator.serviceWorker.ready;
    let sub = await reg.pushManager.getSubscription();
    if (!sub) {
      sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(public_key),
      });
    }
    await api.post(`/trips/${tripId}/push/subscribe`, { subscription: sub.toJSON() });
    return true;
  } catch (e) {
    return false;
  }
}

async function desactivarPush(tripId) {
  try {
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.getSubscription();
    if (sub) {
      await api.post(`/trips/${tripId}/push/unsubscribe`, { subscription: sub.toJSON() });
      await sub.unsubscribe();
    }
  } catch (e) {}
}

function Icon({ name, size = 22, color = "currentColor", strokeWidth = 2, style }) {
  const d = ICON_PATHS[name];
  if (!d) return null;
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
      stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round"
      style={style} dangerouslySetInnerHTML={{ __html: d }} />
  );
}

// ════════════════ PANTALLA DE AUTENTICACIÓN ════════════════

//   crear cuenta  →  "revisa tu correo"  →  (confirma en su email)  →  entrar

          <BrandMark size={20} />

        <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", textAlign: "center" }}>
          <Mark size={92} pulse />

function AuthScreen({ onSuccess, onCancel, modoInicial = "login" }) {
  // modoInicial define el camino: "signup" (usuario nuevo, al guardar su viaje)
  // o "login" (usuario que ya tiene cuenta). NO se ofrece cambiar al otro modo
  // dentro de esta pantalla — el camino lo decidió la Bienvenida. El único
  // cambio de modo permitido es signup → "revisa" (confirma tu correo).
  const [modo, setModo] = React.useState(modoInicial);   // login | signup | revisa
  const [email, setEmail] = React.useState("");
  const [password, setPassword] = React.useState("");
  const [cargando, setCargando] = React.useState(false);
  const [error, setError] = React.useState("");
  const [aviso, setAviso] = React.useState("");
  const [devLink, setDevLink] = React.useState("");   // solo si el backend está en modo dev

  const esSignup = modo === "signup";
  const limpiar = () => { setError(""); setAviso(""); };

  const hacerSignup = async () => {
    limpiar();
    if (!email.trim() || !password) { setError("Escribe tu email y una contraseña."); return; }
    if (password.length < 8) { setError("La contraseña debe tener al menos 8 caracteres."); return; }
    setCargando(true);
    try {
      const r = await authApi.signup(email.trim(), password);
      if (r.dev_verification_link) setDevLink(r.dev_verification_link);
      setModo("revisa");
    } catch (e) {
      setError(e.status === 409 ? "Ese email ya tiene cuenta. Vuelve y entra con 'Ya tengo cuenta'." : (e.message || "No pude crear la cuenta."));
    }
    setCargando(false);
  };

  const hacerLogin = async () => {
    limpiar();
    if (!email.trim() || !password) { setError("Escribe tu email y contraseña."); return; }
    setCargando(true);
    try {
      const r = await authApi.login(email.trim(), password);
      tokenStore.set(r.token);
      onSuccess({ token: r.token, email: r.user.email, plan: r.user.plan });
    } catch (e) {
      if (e.status === 403) { setModo("revisa"); setError(""); }
      else setError(e.status === 401 ? "Email o contraseña incorrectos." : (e.message || "No pude iniciar sesión."));
    }
    setCargando(false);
  };

  const reenviar = async () => {
    limpiar();
    setCargando(true);
    try {
      const r = await authApi.resend(email.trim());
      if (r.dev_verification_link) setDevLink(r.dev_verification_link);
      setAviso("Te reenviamos el enlace. Revisa tu correo (y spam).");
    } catch (e) { setError("No pude reenviar el enlace."); }
    setCargando(false);
  };

  const inputStyle = { width: "100%", boxSizing: "border-box", border: `1px solid ${C.line}`, borderRadius: 12, padding: "13px 14px", marginTop: 6, fontSize: 16, background: C.bg, color: C.ink, outline: "none", WebkitAppearance: "none" };
  const btnPrimario = (txt, on) => (
    <button onClick={on} disabled={cargando}
      style={{ width: "100%", marginTop: 18, padding: "14px", borderRadius: 12, border: "none", background: cargando ? C.line : C.orange, color: cargando ? C.inkSoft : "#fff", fontWeight: 700, fontSize: 16, cursor: cargando ? "default" : "pointer" }}>
      {cargando ? "Un momento…" : txt}
    </button>
  );

  return (
    <div style={{ minHeight: "100dvh", background: C.bg, color: C.ink, overflowY: "auto" }} className="no-scrollbar">
      <div style={{ maxWidth: 420, margin: "0 auto", padding: "max(28px, env(safe-area-inset-top)) 24px 40px", display: "flex", flexDirection: "column", minHeight: "100dvh", boxSizing: "border-box" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 22, fontWeight: 800, letterSpacing: "-0.02em" }}>Voyra</span>
            <BrandMark size={20} />
          </div>
          {onCancel && (
            <button onClick={onCancel} style={{ background: "none", border: "none", color: C.inkSoft, fontSize: 14, cursor: "pointer" }}>Volver</button>
          )}
        </div>

        <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center" }}>
          {modo === "revisa" ? (
            <div>
              <div style={{ fontSize: 40, marginBottom: 8 }}>✉️</div>
              <h1 style={{ fontSize: 24, fontWeight: 800, margin: "4px 0 8px" }}>Confirma tu correo</h1>
              <p style={{ color: C.inkSoft, fontSize: 15, lineHeight: 1.5 }}>
                Te enviamos un enlace a <b style={{ color: C.ink }}>{email.trim()}</b>. Ábrelo para activar tu cuenta y vuelve aquí.
              </p>
              {devLink && (
                <div style={{ marginTop: 14, padding: 12, borderRadius: 10, background: C.aquaSoft, border: `1px solid ${C.line}` }}>
                  <div style={{ fontSize: 11.5, color: C.inkSoft, marginBottom: 6 }}>Modo desarrollo — enlace directo:</div>
                  <a href={devLink} target="_blank" rel="noreferrer" style={{ color: C.aqua, fontSize: 13, wordBreak: "break-all" }}>{devLink}</a>
                </div>
              )}
              {aviso && <p style={{ color: C.aqua, fontSize: 13.5, marginTop: 12 }}>{aviso}</p>}
              {error && <p style={{ color: C.coral, fontSize: 13.5, marginTop: 12 }}>{error}</p>}
              <button onClick={reenviar} disabled={cargando} style={{ width: "100%", marginTop: 16, padding: 12, borderRadius: 12, border: `1px solid ${C.line}`, background: "none", color: C.ink, fontWeight: 600, fontSize: 14.5, cursor: "pointer" }}>
                Reenviar enlace
              </button>
              <button onClick={() => { setModo("login"); limpiar(); }} style={{ width: "100%", marginTop: 10, padding: 12, borderRadius: 12, border: "none", background: C.orange, color: "#fff", fontWeight: 700, fontSize: 15, cursor: "pointer" }}>
                Ya lo confirmé, entrar
              </button>
            </div>
          ) : (
            <div>
              <h1 style={{ fontSize: 26, fontWeight: 800, margin: "0 0 6px", letterSpacing: "-0.02em" }}>
                {esSignup ? "Crea tu cuenta" : "Inicia sesión"}
              </h1>
              <p style={{ color: C.inkSoft, fontSize: 15, lineHeight: 1.5, marginBottom: 18 }}>
                {esSignup
                  ? "Para guardar tu viaje y que tu Companion te acompañe durante todo el camino."
                  : "Entra para retomar tus viajes y tu Companion."}
              </p>

              <label style={{ fontSize: 11.5, fontWeight: 600, color: C.inkSoft, letterSpacing: "0.03em" }}>EMAIL</label>
              <input type="email" inputMode="email" autoCapitalize="none" autoCorrect="off" value={email}
                onChange={(e) => setEmail(e.target.value)} placeholder="tu@correo.com" style={inputStyle} />

              <div style={{ marginTop: 14 }}>
                <label style={{ fontSize: 11.5, fontWeight: 600, color: C.inkSoft, letterSpacing: "0.03em" }}>CONTRASEÑA</label>
                <input type="password" value={password} onChange={(e) => setPassword(e.target.value)}
                  onKeyDown={(e) => { if (e.key === "Enter") (esSignup ? hacerSignup() : hacerLogin()); }}
                  placeholder={esSignup ? "Mínimo 8 caracteres" : "Tu contraseña"} style={inputStyle} />
              </div>

              {error && <p style={{ color: C.coral, fontSize: 13.5, marginTop: 12 }}>{error}</p>}

              {btnPrimario(esSignup ? "Crear cuenta" : "Entrar", esSignup ? hacerSignup : hacerLogin)}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ════════════════ HOME — PERFIL + SELECTOR DE VIAJES ════════════════
// Pantalla intermedia entre el login y el Companion de un viaje específico.
// Todo usuario (nuevo recién registrado o viejo que vuelve) aterriza aquí:
// ve sus datos básicos y sus viajes (máx. MAX_TRIPS, hoy 2). Elegir un viaje
// entra al Companion de ese viaje (la vista que ya existía, sin cambios).
const MAX_TRIPS = 2;

function HomeScreen({ auth, onElegirViaje, onCrearViaje, onCerrarSesion, onAbrirPerfil }) {
  const [viajes, setViajes] = React.useState(null);
  const [error, setError]   = React.useState("");
  const [borrando, setBorrando] = React.useState(null);

  const cargar = React.useCallback(async () => {
    setError("");
    try { const r = await api.get("/trips"); setViajes(r.trips || []); }
    catch { setError("No pude cargar tus viajes. Toca para reintentar."); setViajes([]); }
  }, []);
  React.useEffect(() => { cargar(); }, [cargar]);

  const borrarViaje = async (id, e) => {
    e.stopPropagation();
    if (!window.confirm("¿Borrar este viaje? No se puede deshacer.")) return;
    setBorrando(id);
    try { await api.del(`/trips/${id}`); setViajes((vs) => vs.filter((v) => v.id !== id)); }
    catch { alert("No pude borrar el viaje."); }
    setBorrando(null);
  };

  const tope    = viajes && viajes.length >= MAX_TRIPS;
  const cargando = viajes === null;

  const fechaCorta = (s) => {
    if (!s) return null;
    try { const [y,m,d] = s.split("-"); return `${d}/${m}/${y.slice(2)}`; }
    catch { return s; }
  };

  // Días hasta el primer viaje próximo
  const diasHasta = (inicio) => {
    if (!inicio) return null;
    const hoy  = new Date(); hoy.setHours(0,0,0,0);
    const dest = new Date(inicio + "T00:00:00");
    const diff = Math.round((dest - hoy) / 86400000);
    if (diff < 0)  return null;
    if (diff === 0) return "¡Hoy!";
    if (diff === 1) return "Mañana";
    return `En ${diff} días`;
  };

  const planLabel = auth?.plan === "free" || !auth?.plan
    ? "Explorador" : auth.plan.charAt(0).toUpperCase() + auth.plan.slice(1);
  const inicial = (auth?.email || "?")[0].toUpperCase();

  return (
    <div style={{ minHeight: "100dvh", background: C.bg, color: C.ink, overflowY: "auto" }} className="no-scrollbar">
      <div style={{ maxWidth: 460, margin: "0 auto", boxSizing: "border-box" }}>

        {/* ══ HERO HEADER ══ */}
        <div style={{ padding: "max(32px, env(safe-area-inset-top)) 24px 0", position: "relative" }}>

          {/* glow de fondo sutil */}
          <div style={{ position: "absolute", top: 0, left: "50%", transform: "translateX(-50%)", width: 340, height: 180, background: `radial-gradient(ellipse at 50% 0%, ${C.orange}22 0%, transparent 70%)`, pointerEvents: "none" }} />

          {/* marca */}
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 28, position: "relative" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ fontSize: 26, fontWeight: 900, letterSpacing: "-0.03em", background: `linear-gradient(90deg, ${C.ink} 60%, ${C.inkSoft})`, WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>Voyra</span>
              <BrandMark size={22} />
            </div>
            {/* avatar pequeño como acceso rápido al perfil */}
            <button onClick={onAbrirPerfil} title="Tu perfil"
              style={{ width: 38, height: 38, borderRadius: "50%", background: `linear-gradient(135deg, ${C.orange}, ${C.orangeDeep})`, border: "none", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 15, fontWeight: 800, color: "#fff", cursor: "pointer", boxShadow: `0 0 0 2px ${C.bg}, 0 0 0 3.5px ${C.orange}55` }}>
              {inicial}
            </button>
          </div>

          {/* tarjeta de perfil — hero principal */}
          <button onClick={onAbrirPerfil}
            style={{ width: "100%", textAlign: "left", background: `linear-gradient(145deg, #1E1A17 0%, #18120D 60%, #0E0E10 100%)`, border: `1px solid ${C.orange}28`, borderRadius: 22, padding: "20px 20px 18px", display: "flex", alignItems: "center", gap: 16, marginBottom: 32, cursor: "pointer", position: "relative", overflow: "hidden", boxShadow: `0 8px 32px #00000055, 0 0 0 0.5px ${C.orange}18 inset` }}>
            {/* halos decorativos */}
            <div style={{ position: "absolute", top: -40, right: -40, width: 160, height: 160, borderRadius: "50%", background: C.orange, opacity: 0.07, filter: "blur(20px)", pointerEvents: "none" }} />
            <div style={{ position: "absolute", bottom: -20, left: 40, width: 80, height: 80, borderRadius: "50%", background: C.aqua, opacity: 0.05, filter: "blur(16px)", pointerEvents: "none" }} />

            {/* avatar */}
            <div style={{ width: 54, height: 54, borderRadius: "50%", background: `linear-gradient(135deg, ${C.orange} 0%, ${C.orangeDeep} 100%)`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22, fontWeight: 900, color: "#fff", flexShrink: 0, boxShadow: `0 4px 20px ${C.orange}44`, zIndex: 1 }}>
              {inicial}
            </div>

            {/* info */}
            <div style={{ flex: 1, minWidth: 0, zIndex: 1 }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: C.inkSoft, letterSpacing: "0.08em", marginBottom: 4, textTransform: "uppercase" }}>Tu cuenta</div>
              <div style={{ fontWeight: 700, fontSize: 15.5, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", marginBottom: 7 }}>{auth?.email}</div>
              <span style={{ fontSize: 11, fontWeight: 700, color: C.orange, background: `${C.orange}18`, border: `1px solid ${C.orange}35`, borderRadius: 20, padding: "3px 10px", letterSpacing: "0.03em" }}>
                ✦ Plan {planLabel}
              </span>
            </div>

            <div style={{ flexShrink: 0, zIndex: 1, display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 4 }}>
              <span style={{ color: C.inkSoft, fontSize: 22 }}>›</span>
              <span style={{ fontSize: 10.5, color: C.inkSoft, fontWeight: 600 }}>Perfil</span>
            </div>
          </button>
        </div>

        {/* ══ VIAJES ══ */}
        <div style={{ padding: "0 24px 40px" }}>

          {/* cabecera sección */}
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
            <div>
              <div style={{ fontSize: 11.5, fontWeight: 700, color: C.inkSoft, letterSpacing: "0.08em" }}>TUS VIAJES</div>
            </div>
            {viajes && (
              <span style={{ fontSize: 12, color: C.inkSoft, background: C.card, border: `1px solid ${C.line}`, borderRadius: 20, padding: "3px 10px", fontWeight: 600 }}>
                {viajes.length} / {MAX_TRIPS}
              </span>
            )}
          </div>

          {cargando && (
            <div style={{ textAlign: "center", color: C.inkSoft, fontSize: 14, padding: "36px 0" }}>Cargando…</div>
          )}
          {error && !cargando && (
            <div onClick={cargar} style={{ color: C.coral, fontSize: 13.5, padding: "12px 4px", cursor: "pointer" }}>{error}</div>
          )}

          {/* estado vacío */}
          {!cargando && viajes.length === 0 && !error && (
            <div style={{ padding: "32px 20px", background: C.card, border: `1px dashed ${C.line}`, borderRadius: 18, textAlign: "center" }}>
              <div style={{ fontSize: 30, marginBottom: 10 }}>✈️</div>
              <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 6 }}>Sin viajes aún</div>
              <div style={{ color: C.inkSoft, fontSize: 13.5, lineHeight: 1.55 }}>
                Cuéntale al Companion a dónde vas<br/>y te acompaño desde el primer día.
              </div>
            </div>
          )}

          {/* lista de viajes */}
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            {!cargando && viajes.map((v) => {
              const dias = diasHasta(v.inicio);
              return (
                <button key={v.id} onClick={() => onElegirViaje(v)}
                  style={{ width: "100%", textAlign: "left", display: "flex", alignItems: "center", gap: 0, background: C.card, border: `1px solid ${C.line}`, borderRadius: 18, overflow: "hidden", cursor: "pointer", position: "relative" }}>
                  {/* borde izquierdo acento */}
                  <div style={{ width: 3, alignSelf: "stretch", background: `linear-gradient(180deg, ${C.orange}, ${C.orangeDeep})`, flexShrink: 0 }} />

                  <div style={{ flex: 1, display: "flex", alignItems: "center", gap: 14, padding: "16px 14px 16px 16px", minWidth: 0 }}>
                    <Mark size={40} />
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontWeight: 800, fontSize: 16, letterSpacing: "-0.01em" }}>{v.ciudad || "Viaje sin destino"}</div>
                      <div style={{ fontSize: 12.5, color: C.inkSoft, marginTop: 3 }}>
                        {v.inicio && v.fin ? `${fechaCorta(v.inicio)} → ${fechaCorta(v.fin)}` : (v.hotel || "Completa los datos al entrar")}
                      </div>
                      {dias && (
                        <div style={{ marginTop: 6 }}>
                          <span style={{ fontSize: 11, fontWeight: 700, color: C.aqua, background: `${C.aqua}18`, border: `1px solid ${C.aqua}30`, borderRadius: 20, padding: "2px 8px" }}>
                            {dias}
                          </span>
                        </div>
                      )}
                    </div>
                  </div>

                  <div style={{ display: "flex", alignItems: "center", gap: 2, paddingRight: 12, flexShrink: 0 }}>
                    <button onClick={(e) => borrarViaje(v.id, e)} disabled={borrando === v.id}
                      style={{ background: "none", border: "none", color: C.inkSoft, fontSize: 16, width: 32, height: 32, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", borderRadius: 8, opacity: 0.7 }}>
                      {borrando === v.id ? "…" : "✕"}
                    </button>
                    <span style={{ color: C.inkSoft, fontSize: 20 }}>›</span>
                  </div>
                </button>
              );
            })}
          </div>

          {/* ── Crear viaje ── */}
          <div style={{ marginTop: viajes && viajes.length > 0 ? 16 : 14 }}>
            {tope ? (
              <div style={{ textAlign: "center", fontSize: 13, color: C.inkSoft, padding: "14px 16px", background: C.card, border: `1px solid ${C.line}`, borderRadius: 14, lineHeight: 1.55 }}>
                Máximo de {MAX_TRIPS} viajes activos alcanzado.<br/>Borra uno para crear otro.
              </div>
            ) : (
              <button onClick={onCrearViaje} disabled={cargando}
                style={{ width: "100%", padding: "17px", borderRadius: 16, border: "none", background: `linear-gradient(135deg, ${C.orange} 0%, ${C.orangeDeep} 100%)`, color: "#fff", fontWeight: 800, fontSize: 16, letterSpacing: "-0.01em", cursor: cargando ? "default" : "pointer", opacity: cargando ? 0.5 : 1, boxShadow: cargando ? "none" : `0 4px 24px ${C.orange}55` }}>
                + Crear viaje
              </button>
            )}
          </div>

          {/* ── Cerrar sesión ── */}
          <button onClick={onCerrarSesion}
            style={{ display: "block", margin: "22px auto 0", background: "none", border: "none", color: C.inkSoft, fontSize: 12.5, fontWeight: 600, cursor: "pointer", letterSpacing: "0.02em" }}>
            Cerrar sesión
          </button>
        </div>
      </div>
    </div>
  );
}

function VoyraCompanion() {
  const [fase, setFase] = useState("bienvenida");
  const [tripId, setTripId] = useState(null);
  // ── Sesión del usuario ──
  // auth = null (sin sesión) | { token, email, plan }. Se rehidrata del token
  // guardado al cargar. authGate guarda la acción pendiente que disparó el
  // login, para reanudarla automáticamente tras autenticarse ("al guardar").
  const [auth, setAuth] = useState(null);
  const [authGate, setAuthGate] = useState(false);   // ¿mostrar pantalla de login?
  const pendingActionRef = useRef(null);             // () => void a reanudar tras login
  const [viaje, setViaje] = useState({ ciudad: "Bogotá", hotel: "Hotel NH Collection Bogotá Teusaquillo", inicio: "2026-07-12", fin: "2026-07-18", vueloIda: "AV245", vueloRegreso: "AV244", pais: "Colombia", gustos: ["Gastronomía local", "Historia y cultura"] });

  // Stream conversacional unificado: mensajes, avisos proactivos y recomendaciones
  // en orden cronológico — el Companion "hablando", no bandejas separadas.
  const [stream, setStream] = useState([]);
  const seqRef = useRef(0);
  const appendStream = (item) => setStream((s) => [...s, { seq: seqRef.current++, ...item }]);

  const [input, setInput] = useState("");
  const [pensando, setPensando] = useState(false);
  const [evaluando, setEvaluando] = useState(null);
  const [pushUsados, setPushUsados] = useState(0);
  const [ubicacion, setUbicacion] = useState("En el hotel");
  const [zonaActual, setZonaActual] = useState("En el hotel");
  const [gpsEstado, setGpsEstado] = useState("inactivo"); // inactivo|buscando|ok|denegado|no_soportado|error|manual
  const [docs, setDocs] = useState([]);
  const [planes, setPlanes] = useState([]);              // planes estructurados del viaje
  const [planesPropuestos, setPlanesPropuestos] = useState(null); // {fuente, planes:[...]} pendientes de confirmar
  const [escuchando, setEscuchando] = useState(false);
  const [vozActiva, setVozActiva] = useState(false);
  const [subiendo, setSubiendo] = useState(false);
  const [cargandoCerca, setCargandoCerca] = useState(false);
  const [escaneando, setEscaneando] = useState(false);
  const [log, setLog] = useState([]);        // solo dev
  const [sheet, setSheet] = useState(null);   // null|'menu'|'location'|'dev'
  const [paso, setPaso] = useState(1);         // paso del onboarding
  const [modoSetup, setModoSetup] = useState(null);  // null (elige) | 'manual' | 'subir'
  const [subiendoOnb, setSubiendoOnb] = useState(false); // subiendo reservas en onboarding
  const [docsOnb, setDocsOnb] = useState([]);            // reservas subidas en onboarding
  const [airport, setAirport] = useState(null);   // datos del modo aeropuerto
  const [airportOpen, setAirportOpen] = useState(false);
  // Navegación por pestañas + secciones nuevas (Punto 3 UI)
  const [tab, setTab] = useState("inicio");        // inicio | planes | chat | mas
  const [sosOpen, setSosOpen] = useState(false);
  const [traductorOpen, setTraductorOpen] = useState(false);
  const [infoOpen, setInfoOpen] = useState(false);
  const [docsOpen, setDocsOpen] = useState(false);
  const [guiaVista, setGuiaVista] = useState(false);  // mini-guía de bienvenida
  const [coords, setCoords] = useState(null);          // {lat,lng} GPS para SOS/mapa
  const [pushOn, setPushOn] = useState(false);          // notificaciones push activas
  const [pushDisponible, setPushDisponible] = useState(false);  // backend tiene VAPID + navegador soporta

  const recRef = useRef(null);
  const fileRef = useRef(null);
  const onbFileRef = useRef(null);
  const scrollRef = useRef(null);

  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [stream, pensando]);

  // ── Rehidratar sesión al cargar + capturar 401 globales ──
  useEffect(() => {
    // Si una request devuelve 401 (token expirado/limpiado), cerramos sesión y
    // mandamos al login (no a crear cuenta: el usuario ya la tenía).
    api.onUnauthorized(() => {
      setAuth(null);
      setAuthGate(false);
      setFase("login");
    });
    // ¿Hay token guardado? Validarlo con /auth/me y restaurar la sesión.
    // Si la sesión es válida, el usuario "viejo" entra directo al Home (perfil
    // + lista de viajes) en vez de ver el onboarding de "cuéntanos tu viaje".
    if (tokenStore.get()) {
      (async () => {
        try {
          const u = await authApi.me();
          setAuth({ token: tokenStore.get(), email: u.email, plan: u.plan });
          setFase("home");
        } catch {
          tokenStore.clear();
        }
      })();
    }
  }, []);

  // requireAuth: ejecuta `accion` si hay sesión; si no, guarda la acción y abre
  // el login. Tras autenticarse, la acción se reanuda sola. Este es el "gate"
  // que aparece justo antes de tocar el backend ("login al guardar").
  const requireAuth = (accion) => {
    if (auth) return accion();
    pendingActionRef.current = accion;
    setAuthGate(true);
  };

  // Llamado por la pantalla de auth cuando el login fue exitoso.
  const onAuthSuccess = (sesion) => {
    setAuth(sesion);
    setAuthGate(false);
    const pend = pendingActionRef.current;
    pendingActionRef.current = null;
    if (pend) { try { pend(); } catch {} }
    else setFase("home"); // venía de "Ya tengo cuenta": sin acción que reanudar, va directo al Home.
  };

  const cerrarSesion = async () => {
    try { await authApi.logout(); } catch {}
    tokenStore.clear();
    setAuth(null);
    setTripId(null);
    setStream([]);
    setPlanes([]);
    setFase("bienvenida");
    setModoSetup(null);
    setPaso(1);
    setAuthGate(false);
  };

  const addLog = (entry) => setLog((l) => [{ ...entry, t: new Date().toLocaleTimeString("es-CO", { hour: "2-digit", minute: "2-digit", second: "2-digit" }) }, ...l]);
  const toggleGusto = (g) => setViaje((v) => ({ ...v, gustos: v.gustos.includes(g) ? v.gustos.filter((x) => x !== g) : [...v.gustos, g] }));

  const hablar = (texto) => {
    if (!vozActiva || !window.speechSynthesis) return;
    const u = new SpeechSynthesisUtterance(texto.replace(/[*_#]/g, ""));
    u.lang = "es-MX";
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(u);
  };

  const toggleMic = () => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { appendStream({ type: "companion", texto: "Tu navegador no soporta dictado por voz todavía. Escríbeme mientras tanto 🙂" }); return; }
    if (escuchando) { recRef.current && recRef.current.stop(); setEscuchando(false); return; }
    const rec = new SR();
    rec.lang = "es-419"; rec.interimResults = true; rec.continuous = false;
    rec.onresult = (e) => setInput(Array.from(e.results).map((r) => r[0].transcript).join(""));
    rec.onend = () => setEscuchando(false);
    rec.onerror = () => setEscuchando(false);
    recRef.current = rec; rec.start(); setEscuchando(true);
  };

  // ── GPS → backend (nearest_known_label calcula zona_actual real) ──
  const actualizarGPS = (announce = false) => {
    if (!tripId) return;
    if (!navigator.geolocation) { setGpsEstado("no_soportado"); return; }
    setGpsEstado("buscando");
    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        const { latitude, longitude } = pos.coords;
        setCoords({ lat: latitude, lng: longitude });
        try {
          const data = await api.post(`/trips/${tripId}/location`, { lat: latitude, lng: longitude, zona: ubicacion, disparar_geofence: false });
          setZonaActual(data.zona_actual);
          setGpsEstado("ok");
          if (esZonaAeropuerto(data.zona_actual)) cargarAeropuerto(true);
          addLog({ senal: "Ubicación GPS actualizada", fuente: "GPS del navegador", filtro: `Zona detectada: ${data.zona_actual}`, score: null, decision: "silencio" });
          if (announce) appendStream({ type: "system", texto: `Ahora cerca de ${data.zona_actual}` });
        } catch (e) {
          setGpsEstado("error");
          addLog({ senal: "Ubicación GPS", fuente: "GPS del navegador", filtro: "Error al contactar el backend", score: null, decision: "error", razon: e.message });
        }
      },
      (err) => {
        setGpsEstado(err.code === 1 ? "denegado" : "error");
        addLog({ senal: "Ubicación GPS", fuente: "GPS del navegador", filtro: err.code === 1 ? "Permiso denegado — usando zona manual" : `No se pudo obtener GPS: ${err.message}`, score: null, decision: "silencio" });
      },
      { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
    );
  };

  // Sincroniza ubicación inicial cuando nace el trip; intenta GPS, cae a manual.
  useEffect(() => {
    if (!tripId) return;
    setZonaActual(ubicacion);
    if (navigator.geolocation) {
      actualizarGPS(false);
    } else {
      setGpsEstado("no_soportado");
      (async () => { try { await api.post(`/trips/${tripId}/location`, { zona: ubicacion, disparar_geofence: false }); } catch {} })();
    }
  }, [tripId]);

  const cambiarZona = async (zona) => {
    setUbicacion(zona); setZonaActual(zona); setGpsEstado("manual");
    addLog({ senal: `Ubicación significativa: ${zona}`, fuente: "OS del teléfono", filtro: "Actualiza Trip Context — sin AI, costo cero", score: null, decision: "silencio" });
    if (tripId) { try { await api.post(`/trips/${tripId}/location`, { zona, disparar_geofence: false }); } catch {} }
    if (esZonaAeropuerto(zona)) cargarAeropuerto(true);
  };

  // ── Modo aeropuerto: timeline de llegada al aterrizar ──
  const esZonaAeropuerto = (z) => {
    const n = (z || "").toLowerCase();
    return n.includes("aeropuerto") || n.includes("dorado");
  };
  const cargarAeropuerto = async (auto = false) => {
    if (!tripId) return;
    try {
      const data = await api.get(`/trips/${tripId}/airport`);
      setAirport(data);
      if (data && data.disponible) {
        setSheet(null);
        setAirportOpen(true);
        if (auto) appendStream({ type: "companion", texto: `¡Bienvenido a ${data.city}! Veo que acabas de aterrizar. Te dejé abierta una guía paso a paso para salir de ${data.name} sin perderte ni que te cobren de más — mírala cuando quieras.` });
      } else if (!auto) {
        appendStream({ type: "companion", texto: (data && data.nota) || "Todavía no tengo guía de aeropuerto curada para esta ciudad." });
      }
    } catch (e) { /* silencioso: la llegada nunca debe romperse */ }
  };

  // ── Cargar planes estructurados del backend ──
  const cargarPlanes = async (tid) => {
    const id = tid || tripId;
    if (!id) return;
    try {
      const data = await api.get(`/trips/${id}/plans`);
      setPlanes(data.planes || []);
    } catch (e) {}
  };

  // ── Confirmar (guardar) planes propuestos por el chat o un documento ──
  const confirmarPlanes = async (lista) => {
    if (!tripId || !lista || !lista.length) { setPlanesPropuestos(null); return; }
    try {
      const data = await api.post(`/trips/${tripId}/plans/confirm`, { planes: lista });
      setPlanes(data.planes || []);
      appendStream({ type: "companion", texto: lista.length === 1
        ? `Listo, lo agregué a tu itinerario ✓` : `Listo, agregué ${lista.length} planes a tu itinerario ✓` });
    } catch (e) {
      appendStream({ type: "companion", texto: "No pude guardar el plan. ¿Lo intentamos de nuevo?" });
    }
    setPlanesPropuestos(null);
  };

  const borrarPlan = async (planId) => {
    if (!tripId) return;
    try {
      const data = await api.del(`/trips/${tripId}/plans/${planId}`);
      setPlanes(data.planes || []);
    } catch (e) {}
  };

  // Lee un archivo como data URL (para PDF/imagen) o texto (para .txt).
  const leerArchivo = (file, modo) => new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = () => rej(new Error("read failed"));
    if (modo === "dataurl") r.readAsDataURL(file); else r.readAsText(file);
  });

  // ── Subida de reservas (.txt, PDF, imagen) → extrae datos + planes ──
  const subirDoc = async (file) => {
    if (!file || subiendo || !tripId) return;
    const nombre = file.name.toLowerCase();
    const esPDF = file.type === "application/pdf" || nombre.endsWith(".pdf");
    const esImg = file.type.startsWith("image/") || /\.(png|jpe?g|webp|heic|gif)$/.test(nombre);
    const esTexto = file.type === "text/plain" || nombre.endsWith(".txt");
    if (!esPDF && !esImg && !esTexto) {
      appendStream({ type: "companion", texto: "Puedo leer PDF, imágenes (capturas/fotos) y texto (.txt). ¿Me subes la reserva en uno de esos formatos?" });
      return;
    }
    setSubiendo(true);
    appendStream({ type: "user", texto: `📎 ${file.name}` });
    appendStream({ type: "companion", texto: "Déjame leer eso…" });
    try {
      let body = { filename: file.name };
      if (esPDF) body.pdf_data_url = await leerArchivo(file, "dataurl");
      else if (esImg) body.image_data_url = await leerArchivo(file, "dataurl");
      else body.text_content = (await leerArchivo(file, "text")).slice(0, 7000);
      const data = await api.post(`/trips/${tripId}/documents`, body);
      setDocs((d) => [...d, { nombre: file.name, tipo: data.tipo, resumen: data.resumen }]);
      appendStream({ type: "companion", texto: data.confirmacion });
      addLog({ senal: `Documento: ${file.name}`, fuente: "Usuario", filtro: `✓ Extraído (tipo: ${data.tipo})`, score: null, decision: "silencio" });
      // Si encontró planes agendables, ofrecer agregarlos al calendario.
      const props = data.planes_propuestos || [];
      if (props.length) setPlanesPropuestos({ fuente: "documento", planes: props });
    } catch (e) {
      appendStream({ type: "companion", texto: "No pude leer ese archivo. ¿Probamos con otra foto o el texto de la confirmación?" });
    }
    setSubiendo(false);
  };

  // ── Chat / acciones de 1 tap ──
  const enviar = async (display, apiTexto) => {
    const msgDisplay = (display || input).trim();
    const msgApi = (apiTexto || msgDisplay).trim();
    if (!msgDisplay || pensando || !tripId) return;
    setInput("");
    appendStream({ type: "user", texto: msgDisplay });
    setPensando(true);
    try {
      const data = await api.post(`/trips/${tripId}/chat`, { message: msgApi });
      appendStream({ type: "companion", texto: data.reply });
      hablar(data.reply);
      // Si detectó un plan en lo que el usuario contó, ofrecer agregarlo.
      const props = data.planes_propuestos || [];
      if (props.length) setPlanesPropuestos({ fuente: "chat", planes: props });
      // Si detectó búsqueda de cadena, mostrar resultados con mapa.
      if (data.chain_results && data.chain_results.items && data.chain_results.items.length) {
        appendStream({ type: "chain_recos", query: data.chain_results.query,
                       items: data.chain_results.items });
      }
    } catch (e) {
      appendStream({ type: "companion", texto: "Se me cruzaron los cables un segundo. ¿Me lo repites?" });
    }
    setPensando(false);
  };

  // ── "Qué hay cerca de mí" → /nearby (curación por distancia real) ──
  const buscarCerca = async () => {
    if (!tripId || cargandoCerca) return;
    setSheet(null);
    setCargandoCerca(true);
    appendStream({ type: "user", texto: "¿Qué hay cerca de mí ahora?" });
    try {
      const data = await api.post(`/trips/${tripId}/nearby`, {});
      const resultados = data.resultados || [];
      const zonaTxt = data.zona_actual || "tu zona";
      const recos = [];
      if (resultados.length === 0) {
        appendStream({ type: "companion", texto: data.nota || `Ya te mostré lo cercano a ${zonaTxt} en las últimas horas. Te aviso apenas aparezca algo nuevo.` });
      } else {
        resultados.forEach((r) => {
          const modo = suggestModeJS(r.distancia_km);
          const mapsLink = r.maps_link || (r.notification && r.notification.maps_link) || mapsLinkJS(r.lugar, viaje.ciudad, modo);
          const distTxt = r.distancia_km == null ? "distancia desconocida" : r.distancia_km < 0.05 ? "en tu zona" : `a ~${r.distancia_km} km de ti`;
          addLog({ senal: `Cerca: ${r.lugar} (${distTxt})`, fuente: "Curación de destino", filtro: r.filter !== "pass" ? `✕ Filtro: ${r.filter}` : `✓ Pasa — score ${r.score}`, score: r.score, razon: r.reason, decision: r.decision });
          if (r.notification && r.notification.kind === "push") {
            const n = r.notification;
            appendStream({ type: "push", id: n.id, titulo: n.title, mensaje: n.body, accion: n.action, operativo: false, lugar: r.lugar, distancia_km: r.distancia_km, mapsLink });
            setPushUsados((p) => p + 1);
          } else {
            recos.push({ lugar: r.lugar, mensaje: distTxt + (r.reason ? ` · ${r.reason}` : ""), mapsLink, distancia_km: r.distancia_km });
          }
        });
        if (recos.length) appendStream({ type: "recos", zona: zonaTxt, items: recos });
      }
    } catch (e) {
      appendStream({ type: "companion", texto: "No pude revisar tu zona ahora mismo. Reintenta en un momento." });
      addLog({ senal: "Qué hay cerca", fuente: "Curación de destino", filtro: "Error de backend", score: null, decision: "error", razon: e.message });
    }
    setCargandoCerca(false);
  };

  // ── DEV: check-in nocturno (en prod lo dispara el cron de las 8pm) ──
  const checkInNocturno = async () => {
    if (pensando || !tripId) return;
    setPensando(true);
    addLog({ senal: "Check-in nocturno", fuente: "Cron 8pm", filtro: "✓ Rutina diaria de contexto", score: null, decision: "push" });
    try {
      const data = await api.post(`/trips/${tripId}/checkin`, {});
      appendStream({ type: "push", id: `checkin-${Date.now()}`, titulo: "Tu Companion", mensaje: data.message, accion: null, operativo: false });
      hablar(data.message);
    } catch (e) {
      appendStream({ type: "companion", texto: "¿Qué planes tienes para mañana? Así te organizo el día." });
    }
    setPensando(false);
  };

  // ── DEV: motor de relevancia (en prod lo disparan los watchers) ──
  const evaluar = async (senal) => {
    if (evaluando || !tripId) return;
    setEvaluando(senal.id);
    const zonaGeo = ubicacion === "En el hotel" ? "La Candelaria" : ubicacion;
    const payloadFinal = senal.id === "geofence"
      ? `El usuario acaba de entrar caminando a la zona "${zonaGeo}" de ${viaje.ciudad}. Son las 12:45 del mediodía.`
      : senal.payload;
    if (senal.id === "geofence" && ubicacion === "En el hotel") setUbicacion("La Candelaria");
    try {
      if (senal.id === "geofence") await api.post(`/trips/${tripId}/location`, { zona: zonaGeo, disparar_geofence: false });
      const data = await api.post(`/trips/${tripId}/signals`, { source: senal.fuente, category: senal.categoria, operational: senal.operativo, payload: payloadFinal });
      addLog({ senal: senal.nombre, fuente: senal.fuente, filtro: data.filter !== "pass" ? `✕ Filtro: ${data.filter}` : `✓ Pasa — score ${data.score}`, score: data.score, razon: data.reason, decision: data.decision });
      if (data.notification) {
        const n = data.notification;
        if (n.kind === "push") {
          appendStream({ type: "push", id: n.id, titulo: n.title, mensaje: n.body, accion: n.action, operativo: senal.operativo, mapsLink: n.maps_link });
          if (!senal.operativo) setPushUsados((p) => p + 1);
        } else if (n.kind === "feed") {
          appendStream({ type: "card", titulo: n.title, mensaje: n.body, accion: n.action });
        }
      }
    } catch (e) {
      addLog({ senal: senal.nombre, fuente: senal.fuente, filtro: "Error de backend", score: null, decision: "error", razon: e.message });
    }
    setEvaluando(null);
  };

  // ── DEV: escanear destino → /scan ──
  const escanearDestino = async () => {
    if (!tripId || escaneando) return;
    setEscaneando(true);
    try {
      const data = await api.post(`/trips/${tripId}/scan`, {});
      const resultados = data.resultados || [];
      if (resultados.length === 0) {
        addLog({ senal: "Escaneo del destino", fuente: `Tavily (${data.search_mode || "?"})`, filtro: `${data.procesados ?? 0}/${data.encontrados ?? 0} procesados.`, score: null, decision: "silencio" });
      } else {
        resultados.forEach((r) => {
          const esNoticia = r.tipo === "noticia";
          addLog({ senal: `${esNoticia ? "Noticia" : "Tendencia"}: ${r.fuente}`, fuente: esNoticia ? "News watcher" : "Destination Scanner", filtro: r.filter !== "pass" ? `✕ Filtro: ${r.filter}` : `✓ Pasa — score ${r.score}`, score: r.score, razon: r.reason, decision: r.decision });
          if (r.notification) {
            const n = r.notification;
            if (n.kind === "push") { appendStream({ type: "push", id: n.id, titulo: n.title, mensaje: n.body, accion: n.action, operativo: esNoticia }); setPushUsados((p) => p + 1); }
            else appendStream({ type: "card", titulo: n.title, mensaje: n.body, accion: n.action });
          }
        });
      }
    } catch (e) {
      addLog({ senal: "Escaneo del destino", fuente: "Tavily", filtro: "Error de backend", score: null, decision: "error", razon: e.message });
    }
    setEscaneando(false);
  };

  const reiniciar = () => {
    setSheet(null); setFase("setup"); setPaso(1); setModoSetup(null); setSubiendoOnb(false); setDocsOnb([]); setTripId(null); setStream([]); seqRef.current = 0;
    setLog([]); setPushUsados(0); setUbicacion("En el hotel"); setZonaActual("En el hotel");
    setGpsEstado("inactivo"); setDocs([]); setPlanes([]); setPlanesPropuestos(null); setVozActiva(false); setCargandoCerca(false); setEscaneando(false);
  };

  // Volver al Home (perfil + lista de viajes) sin perder la sesión — es el
  // "atrás" desde dentro de un viaje, distinto de reiniciar() que arranca el
  // onboarding de un viaje nuevo.
  const volverAlHome = () => {
    setSheet(null); setTripId(null); setStream([]); seqRef.current = 0;
    setPlanes([]); setPlanesPropuestos(null); setCargandoCerca(false); setEscaneando(false);
    setFase("home");
  };

  // Entra al Companion de un viaje YA EXISTENTE, elegido desde el Home. Trae
  // el trip completo (por si el Home solo tenía un resumen), sus planes, y
  // arranca push igual que antes hacía entrarApp al crear un viaje nuevo.
  const abrirViaje = async (resumen) => {
    try {
      const trip = await api.get(`/trips/${resumen.id}`);
      setTripId(trip.id);
      setViaje((v) => ({
        ...v,
        ciudad: trip.ciudad || v.ciudad,
        hotel: trip.hotel || v.hotel,
        inicio: trip.inicio || v.inicio,
        fin: trip.fin || v.fin,
        vueloIda: trip.vuelo_ida || v.vueloIda,
        vueloRegreso: trip.vuelo_regreso || v.vueloRegreso,
        pais: trip.pais || v.pais,
        gustos: trip.gustos && trip.gustos.length ? trip.gustos : v.gustos,
      }));
      setZonaActual(trip.zona_actual || "En el hotel");
      setUbicacion(trip.zona_actual || "En el hotel");
      await cargarPlanes(trip.id);
      setStream([]); seqRef.current = 0;
      setTab("inicio");
      setGuiaVista(true);
      setFase("agente");
      try {
        if (!pushSupported()) return;
        const pk = await api.get("/push/public-key");
        if (pk.enabled) {
          setPushDisponible(true);
          const reg = await navigator.serviceWorker.ready;
          const sub = await reg.pushManager.getSubscription();
          setPushOn(!!sub && Notification.permission === "granted");
        }
      } catch (e) {}
    } catch (e) {
      alert("No pude abrir ese viaje. Intenta de nuevo.");
    }
  };

  // Días del viaje para el calendario de Planes (de 'inicio' a 'fin').
  // IMPORTANTE: debe ir ANTES de cualquier `return` condicional para que el
  // orden de hooks sea idéntico en todos los renders (setup y agente).
  const diasViaje = React.useMemo(() => {
    const out = [];
    try {
      const ini = new Date(viaje.inicio + "T12:00:00");
      const fin = new Date(viaje.fin + "T12:00:00");
      // Indexar planes por fecha (YYYY-MM-DD).
      const porDia = {};
      (planes || []).forEach((p) => {
        if (p.fecha) (porDia[p.fecha] = porDia[p.fecha] || []).push(p);
      });
      for (let d = new Date(ini); d <= fin; d.setDate(d.getDate() + 1)) {
        const dd = new Date(d);
        const iso = `${dd.getFullYear()}-${String(dd.getMonth() + 1).padStart(2, "0")}-${String(dd.getDate()).padStart(2, "0")}`;
        out.push({ date: dd, iso, planes: porDia[iso] || [] });
      }
    } catch (e) {}
    return out;
  }, [viaje.inicio, viaje.fin, planes]);

  // Planes con fecha fuera del rango o sin fecha → "por agendar" (no se pierden).
  const planesSinDia = React.useMemo(() => {
    const isos = new Set((diasViaje || []).map((d) => d.iso));
    return (planes || []).filter((p) => !p.fecha || !isos.has(p.fecha));
  }, [planes, diasViaje]);

  // Notificaciones push: activar/desactivar
  const togglePush = async () => {
    if (pushOn) {
      await desactivarPush(tripId);
      setPushOn(false);
    } else {
      const ok = await activarPush(tripId);
      setPushOn(ok);
      if (!ok && Notification.permission === "denied") {
        appendStream({ type: "system", texto: "Las notificaciones están bloqueadas. Actívalas en los ajustes de tu navegador." });
      }
    }
  };

  // ════════════════ BIENVENIDA ════════════════
  // Primera pantalla cuando no hay sesión guardada (si hay token válido, la
  // rehidratación de sesión ya mandó a "home" antes de llegar aquí).
  // ════════════════ LOGIN (usuario que ya tiene cuenta) ════════════════
  // Camino "Ya tengo cuenta" de la Bienvenida. Modo login fijo (sin opción de
  // crear cuenta aquí). "Volver" regresa a la Bienvenida.
  if (fase === "login") {
    return (
      <AuthScreen
        modoInicial="login"
        onSuccess={onAuthSuccess}
        onCancel={() => setFase("bienvenida")}
      />
    );
  }

  // ════════════════ GATE DE SIGNUP (usuario nuevo, al guardar su viaje) ═════
  // Se abre cuando el usuario nuevo termina el onboarding e intenta guardar.
  // Modo signup fijo. "Volver" descarta la acción pendiente y regresa a la
  // Bienvenida (no al onboarding a medias, que no tenía sentido).
  if (authGate) {
    return (
      <AuthScreen
        modoInicial="signup"
        onSuccess={onAuthSuccess}
        onCancel={() => { pendingActionRef.current = null; setAuthGate(false); setFase("bienvenida"); }}
      />
    );
  }

  // ════════════════ BIENVENIDA ════════════════
  // Primera pantalla cuando no hay sesión guardada (si hay token válido, la
  // rehidratación de sesión ya mandó a "home" antes de llegar aquí).
  if (fase === "bienvenida") {
    return (
      <WelcomeScreen
        onSoyNuevo={() => setFase("setup")}
        onYaTengoCuenta={() => setFase("login")}
      />
    );
  }

  // ════════════════ HOME — perfil + selector de viajes ════════════════
  // Punto de entrada para todo usuario CON sesión: el viejo llega aquí directo
  // al cargar; el nuevo llega aquí justo después de crear su cuenta (tras el
  // onboarding). Desde aquí elige un viaje y entra al Companion, o crea uno.
  if (fase === "home") {
    return (
      <HomeScreen
        auth={auth}
        onElegirViaje={abrirViaje}
        onCrearViaje={() => { setTripId(null); setViaje((v) => ({ ...v, ciudad: "", hotel: "", inicio: "", fin: "", vueloIda: "", vueloRegreso: "" })); setPaso(1); setModoSetup(null); setDocsOnb([]); setFase("setup"); }}
        onCerrarSesion={cerrarSesion}
        onAbrirPerfil={() => setFase("perfil")}
      />
    );
  }

  // ════════════════ PERFIL GLOBAL ════════════════
  if (fase === "perfil") {
    return (
      <ProfileScreen
        auth={auth}
        onVolver={() => setFase("home")}
        onCerrarSesion={cerrarSesion}
      />
    );
  }

  // ════════════════ ONBOARDING ════════════════
  if (fase === "setup") {
    const paso1ok = viaje.ciudad.trim() && viaje.hotel.trim() && viaje.inicio && viaje.fin;
    const Campo = ({ label, k, ph, type }) => (
      <div style={{ minWidth: 0 }}>
        <label style={{ fontSize: 11.5, fontWeight: 600, color: C.inkSoft, letterSpacing: "0.03em" }}>{label}</label>
        <input type={type || "text"} value={viaje[k]} onChange={(e) => setViaje({ ...viaje, [k]: e.target.value })} placeholder={ph}
          style={{ width: "100%", minWidth: 0, border: `1px solid ${C.line}`, borderRadius: 12, padding: type === "date" ? "12px 10px" : "12px 14px", marginTop: 5, fontSize: type === "date" ? 14.5 : 16, background: C.bg, color: C.ink, outline: "none", boxSizing: "border-box", WebkitAppearance: "none", appearance: "none" }} />
      </div>
    );
    // Helper compartido: una vez creado el viaje, guarda el saludo inicial y
    // manda al Home (perfil + lista de viajes) — nunca entra directo al
    // Companion. Desde el Home, el usuario elige el viaje y ahí sí entra.
    const entrarApp = (data) => {
      setTripId(data.trip_id);
      if (data.greeting) appendStream({ type: "companion", texto: data.greeting });
      if (data.trip) setViaje((v) => ({
        ...v,
        ciudad: data.trip.ciudad || v.ciudad,
        hotel: data.trip.hotel || v.hotel,
        inicio: data.trip.inicio || v.inicio,
        fin: data.trip.fin || v.fin,
        vueloIda: data.trip.vuelo_ida || v.vueloIda,
        vueloRegreso: data.trip.vuelo_regreso || v.vueloRegreso,
      }));
      cargarPlanes(data.trip_id);
      setFase("home");
    };

    const activar = () => requireAuth(async () => {
      try {
        const data = await api.post("/trips", { ciudad: viaje.ciudad.trim(), hotel: viaje.hotel.trim(), inicio: viaje.inicio, fin: viaje.fin, vuelo_ida: viaje.vueloIda.trim(), vuelo_regreso: viaje.vueloRegreso.trim(), pais: viaje.pais.trim() || "Colombia", gustos: viaje.gustos });
        entrarApp(data);
      } catch (e) {
        alert(e.status === 429 ? e.message : "No pude conectar con tu Companion. Revisa que el backend esté arriba.");
      }
    });

    // ── Camino "subir reservas": crea viaje en blanco si no existe y sube cada archivo ──
    const asegurarViaje = async () => {
      if (tripId) return tripId;
      const data = await api.post("/trips", { pais: viaje.pais.trim() || "Colombia", gustos: viaje.gustos });
      setTripId(data.trip_id);
      return data.trip_id;
    };

    const subirReservaOnb = (file) => requireAuth(async () => {
      if (!file) return;
      const nombre = file.name.toLowerCase();
      const esPDF = file.type === "application/pdf" || nombre.endsWith(".pdf");
      const esImg = file.type.startsWith("image/") || /\.(png|jpe?g|webp|heic|gif)$/.test(nombre);
      const esTexto = file.type === "text/plain" || nombre.endsWith(".txt");
      if (!esPDF && !esImg && !esTexto) {
        setDocsOnb((d) => [...d, { nombre: file.name, error: "Formato no soportado (usa PDF, imagen o .txt)" }]);
        return;
      }
      setSubiendoOnb(true);
      try {
        const tid = await asegurarViaje();
        let body = { filename: file.name };
        if (esPDF) body.pdf_data_url = await leerArchivo(file, "dataurl");
        else if (esImg) body.image_data_url = await leerArchivo(file, "dataurl");
        else body.text_content = (await leerArchivo(file, "text")).slice(0, 7000);
        const data = await api.post(`/trips/${tid}/documents`, body);
        // refleja en el form lo que se extrajo del viaje
        if (data.trip) setViaje((v) => ({
          ...v,
          ciudad: v.ciudad || data.trip.ciudad || "",
          hotel: v.hotel || data.trip.hotel || "",
          inicio: v.inicio || data.trip.inicio || "",
          fin: v.fin || data.trip.fin || "",
          vueloIda: v.vueloIda || data.trip.vuelo_ida || "",
          vueloRegreso: v.vueloRegreso || data.trip.vuelo_regreso || "",
        }));
        // guarda planes detectados directo (en onboarding no interrumpimos con la hoja)
        const props = data.planes_propuestos || [];
        if (props.length) { try { await api.post(`/trips/${tid}/plans/confirm`, { planes: props }); } catch (e) {} }
        setDocsOnb((d) => [...d, { nombre: file.name, tipo: data.tipo, resumen: data.resumen, planes: props.length }]);
      } catch (e) {
        setDocsOnb((d) => [...d, { nombre: file.name, error: e.status === 429 ? e.message : "No pude leerlo" }]);
      }
      setSubiendoOnb(false);
    });

    // Entrar tras subir reservas. Exige al menos ciudad + fechas (las completa el form si faltan).
    const finalizarSubida = () => requireAuth(async () => {
      try {
        const tid = await asegurarViaje();
        const patch = {};
        if (viaje.ciudad.trim()) patch.ciudad = viaje.ciudad.trim();
        if (viaje.hotel.trim()) patch.hotel = viaje.hotel.trim();
        if (viaje.inicio) patch.inicio = viaje.inicio;
        if (viaje.fin) patch.fin = viaje.fin;
        if (viaje.vueloIda.trim()) patch.vuelo_ida = viaje.vueloIda.trim();
        if (viaje.vueloRegreso.trim()) patch.vuelo_regreso = viaje.vueloRegreso.trim();
        if (viaje.pais.trim()) patch.pais = viaje.pais.trim();
        if (viaje.gustos.length) patch.gustos = viaje.gustos;
        const trip = await api.patch(`/trips/${tid}`, patch);
        await cargarPlanes(tid);
        entrarApp({ trip_id: tid, trip, greeting: `Tu viaje a ${trip.ciudad || "tu destino"} está listo. Cualquier cosa, aquí estoy ✓` });
      } catch (e) {
        alert(e.status === 429 ? e.message : "No pude terminar de armar tu viaje. Revisa la conexión.");
      }
    });

    return (
      <div style={{ minHeight: "100dvh", background: C.bg, color: C.ink, overflowY: "auto" }} className="no-scrollbar">

          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginTop: 6 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>

                <button onClick={() => { if (paso === 2) setPaso(1); else setModoSetup(null); }} style={{ border: "none", background: "none", fontSize: 22, color: C.inkSoft, cursor: "pointer", lineHeight: 1, padding: 0, marginRight: 2 }}>‹</button>

                <button onClick={() => setFase("bienvenida")} style={{ border: "none", background: "none", fontSize: 22, color: C.inkSoft, cursor: "pointer", lineHeight: 1, padding: 0, marginRight: 2 }}>‹</button>

              <div style={{ fontWeight: 800, fontSize: 20, letterSpacing: "-0.02em" }}>Voyra</div>
            </div>
          </div>

          {/* héroe: el personaje */}
          <div className="rise" style={{ textAlign: "center", marginTop: modoSetup ? 14 : 26 }}>

          </div>

          {/* ── PANTALLA DE IMPACTO + ELECCIÓN ── */}
          {!modoSetup && (
            <div key="elige" className="rise" style={{ marginTop: 18, display: "flex", flexDirection: "column", flex: 1 }}>
              <h1 style={{ fontSize: 30, fontWeight: 800, lineHeight: 1.12, letterSpacing: "-0.03em", textAlign: "center", margin: 0 }}>

              </h1>
              <p style={{ color: C.inkSoft, marginTop: 14, fontSize: 15.5, lineHeight: 1.55, textAlign: "center", maxWidth: 340, marginLeft: "auto", marginRight: "auto" }}>

              </p>

              <div style={{ marginTop: 30, display: "flex", flexDirection: "column", gap: 12 }}>
                <div style={{ fontSize: 12.5, fontWeight: 700, color: C.inkSoft, letterSpacing: "0.06em", textAlign: "center" }}>¿CÓMO ARMAMOS TU VIAJE?</div>

                {/* Opción 1: subir reservas (protagonista) */}
                <button onClick={() => setModoSetup("subir")} style={{ textAlign: "left", background: C.orange, border: "none", borderRadius: 18, padding: "17px 18px", cursor: "pointer", display: "flex", alignItems: "center", gap: 14, boxShadow: `0 8px 24px ${C.orange}44` }}>
                  <div style={{ width: 46, height: 46, borderRadius: 13, background: "rgba(255,255,255,.18)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                    <Icon name="doc" size={24} color="#fff" />
                  </div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 16, fontWeight: 800, color: "#fff" }}>Subir mis reservas</div>
                    <div style={{ fontSize: 13, color: "rgba(255,255,255,.9)", marginTop: 2, lineHeight: 1.4 }}>Foto, PDF o captura. Yo extraigo todo y armo tu itinerario.</div>
                  </div>
                </button>

                {/* Opción 2: manual */}
                <button onClick={() => setModoSetup("manual")} style={{ textAlign: "left", background: C.card, border: `1px solid ${C.line}`, borderRadius: 18, padding: "17px 18px", cursor: "pointer", display: "flex", alignItems: "center", gap: 14 }}>
                  <div style={{ width: 46, height: 46, borderRadius: 13, background: C.bg, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                    <Icon name="pin" size={22} color={C.aqua} />
                  </div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 16, fontWeight: 800, color: C.ink }}>Llenar lo esencial a mano</div>
                    <div style={{ fontSize: 13, color: C.inkSoft, marginTop: 2, lineHeight: 1.4 }}>Destino, fechas y hotel. Toma menos de un minuto.</div>
                  </div>
                  <Icon name="exit" size={18} color={C.inkSoft} />
                </button>
              </div>

              <p style={{ fontSize: 12, color: C.inkSoft, textAlign: "center", marginTop: "auto", paddingTop: 22 }}>Ubicación inteligente: menos del 2% de batería al día. Sin GPS continuo.</p>
            </div>
          )}

          {/* ── CAMINO MANUAL ── */}
          {modoSetup === "manual" && paso === 1 && (
            <div key="m1" className="rise" style={{ marginTop: 6 }}>
              <h1 style={{ fontSize: 24, fontWeight: 700, lineHeight: 1.2, letterSpacing: "-0.02em", textAlign: "center", margin: 0 }}>Cuéntame de tu viaje</h1>
              <p style={{ color: C.inkSoft, marginTop: 10, fontSize: 14.5, lineHeight: 1.5, textAlign: "center" }}>Solo lo esencial — el resto lo afinamos juntos sobre la marcha.</p>

              <div style={{ background: C.card, border: `1px solid ${C.line}`, borderRadius: 20, padding: 18, marginTop: 20 }}>
                <div className="space-y-4">
                  {Campo({ label: "¿A DÓNDE VAS?", k: "ciudad", ph: "Bogotá" })}
                  {Campo({ label: "¿DÓNDE TE ALOJAS?", k: "hotel", ph: "Nombre del hotel" })}
                  <div className="flex gap-3">
                    <div className="flex-1 min-w-0">{Campo({ label: "LLEGADA", k: "inicio", type: "date" })}</div>
                    <div className="flex-1 min-w-0">{Campo({ label: "REGRESO", k: "fin", type: "date" })}</div>
                  </div>
                </div>
              </div>

              <button onClick={() => paso1ok && setPaso(2)} disabled={!paso1ok}
                style={{ width: "100%", background: paso1ok ? C.orange : C.line, color: paso1ok ? "#fff" : C.inkSoft, border: "none", borderRadius: 14, padding: "15px 0", fontSize: 16, fontWeight: 700, cursor: paso1ok ? "pointer" : "default", marginTop: 18 }}>

            </div>

              <input ref={onbFileRef} type="file" multiple accept=".txt,text/plain,application/pdf,.pdf,image/*" style={{ display: "none" }}

              <button onClick={() => onbFileRef.current && onbFileRef.current.click()} disabled={subiendoOnb}

                        <div style={{ fontSize: 11.5, color: C.inkSoft }}>{d.error ? d.error : (d.planes ? `${d.planes} ${d.planes === 1 ? "plan agregado" : "planes agregados"}` : "Leído ✓")}</div>
                      </div>
                    </div>
                  ))}
                </div>
              )}

              {/* completar lo que falte: solo aparece tras subir algo */}
              {docsOnb.some((d) => !d.error) && (
                <div style={{ background: C.card, border: `1px solid ${C.line}`, borderRadius: 20, padding: 18, marginTop: 16 }}>

                  </div>
                  <div className="space-y-4">
                    {Campo({ label: "DESTINO", k: "ciudad", ph: "Bogotá" })}
                    <div className="flex gap-3">
                      <div className="flex-1 min-w-0">{Campo({ label: "LLEGADA", k: "inicio", type: "date" })}</div>
                      <div className="flex-1 min-w-0">{Campo({ label: "REGRESO", k: "fin", type: "date" })}</div>
                    </div>
                    {Campo({ label: "HOTEL · opcional", k: "hotel", ph: "Nombre del hotel" })}

                </div>
              )}

              <button onClick={finalizarSubida} disabled={!(viaje.ciudad.trim() && viaje.inicio && viaje.fin)}

                {docsOnb.some((d) => !d.error) ? "Entrar a mi viaje" : "Sube al menos una reserva"}
              </button>
              <button onClick={() => { setModoSetup("manual"); setPaso(1); }} style={{ width: "100%", background: "none", border: "none", color: C.inkSoft, fontSize: 14, fontWeight: 600, cursor: "pointer", marginTop: 10 }}>
                Mejor lo lleno a mano
              </button>
            </div>

          {/* ── PASO 2 (común, opcional, tras manual) ── */}

            <div key="p2" className="rise" style={{ marginTop: 6 }}>

              <p style={{ color: C.inkSoft, marginTop: 10, fontSize: 14.5, lineHeight: 1.5, textAlign: "center" }}>Todo opcional. Puedes <b style={{ color: C.ink }}>entrar directo</b> y subir tus reservas adentro cuando quieras.</p>

              <div style={{ background: C.aquaSoft, border: `1px solid ${C.aqua}55`, borderRadius: 16, padding: "13px 15px", marginTop: 16, display: "flex", alignItems: "center", gap: 11 }}>
                <Icon name="doc" size={20} color={C.aqua} />
                <div style={{ fontSize: 12.5, color: C.inkSoft, lineHeight: 1.45 }}>
                  En el inicio verás <b style={{ color: C.ink }}>“Sube tus reservas”</b> — vuelos, hotel y tours se desglosan en tu itinerario.
                </div>
              </div>

              <div style={{ background: C.card, border: `1px solid ${C.line}`, borderRadius: 20, padding: 18, marginTop: 16 }}>
                <div className="space-y-4">
                  <div>
                    <label style={{ fontSize: 11.5, fontWeight: 600, color: C.inkSoft, letterSpacing: "0.03em" }}>TUS VUELOS <span style={{ fontWeight: 400, textTransform: "none" }}>· opcional, o súbelos después</span></label>
                    <div className="flex gap-3" style={{ marginTop: 5 }}>
                      <input value={viaje.vueloIda} onChange={(e) => setViaje({ ...viaje, vueloIda: e.target.value })} placeholder="Ida · AV245"
                        style={{ flex: 1, minWidth: 0, border: `1px solid ${C.line}`, borderRadius: 12, padding: "12px 14px", fontSize: 16, background: C.bg, color: C.ink, outline: "none", boxSizing: "border-box" }} />
                      <input value={viaje.vueloRegreso} onChange={(e) => setViaje({ ...viaje, vueloRegreso: e.target.value })} placeholder="Regreso · AV244"
                        style={{ flex: 1, minWidth: 0, border: `1px solid ${C.line}`, borderRadius: 12, padding: "12px 14px", fontSize: 16, background: C.bg, color: C.ink, outline: "none", boxSizing: "border-box" }} />
                    </div>
                  </div>
                  {Campo({ label: "PAÍS DE ORIGEN · para emergencias", k: "pais", ph: "Colombia" })}
                  <div>
                    <label style={{ fontSize: 11.5, fontWeight: 600, color: C.inkSoft, letterSpacing: "0.03em" }}>¿QUÉ TE GUSTA?</label>
                    <div className="flex flex-wrap gap-2 mt-2">
                      {GUSTOS.map((g) => {
                        const on = viaje.gustos.includes(g);
                        return (
                          <button key={g} onClick={() => toggleGusto(g)}
                            style={{ fontSize: 13, padding: "7px 13px", borderRadius: 999, border: `1px solid ${on ? C.orange : C.line}`, background: on ? C.orangeSoft : C.card, color: on ? C.orangeDeep : C.inkSoft, fontWeight: on ? 600 : 500, cursor: "pointer" }}>
                            {g}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                </div>
              </div>

              <button onClick={activar}
                style={{ width: "100%", background: C.orange, color: "#fff", border: "none", borderRadius: 14, padding: "15px 0", fontSize: 16, fontWeight: 700, cursor: "pointer", marginTop: 18, boxShadow: "0 6px 18px " + C.orange + "44" }}>
