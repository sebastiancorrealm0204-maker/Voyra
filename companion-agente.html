// El contrato de API es IDÉNTICO al prototipo: /trips, /trips/{id}/location,

// payload ni respuesta. Lo que cambió es la capa de presentación (UI de
// producto + PWA) y que los controles del motor viven en modo dev (?debug=1).
const API = (typeof process !== "undefined" && process.env?.REACT_APP_API_URL)
  || (window.location.hostname === "localhost" || window.location.protocol === "file:"
      ? "http://localhost:8000"
      : window.location.origin);

const api = {
  post: async (path, body) => {
    const r = await fetch(`${API}${path}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    if (!r.ok) throw new Error(`${r.status} ${await r.text()}`);
    return r.json();
  },
  get: async (path) => {
    const r = await fetch(`${API}${path}`);
    if (!r.ok) throw new Error(`${r.status} ${await r.text()}`);
    return r.json();
  },
};

const DEBUG = new URLSearchParams(window.location.search).has("debug");

// ── Web Push (VAPID) ──
// Convierte la clave pública VAPID (base64url) al formato que pide el navegador.
function urlBase64ToUint8Array(base64String) {
  const padding = "=".repeat((4 - (base64String.length % 4)) % 4);
  const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
  const raw = window.atob(base64);
  const arr = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
  return arr;
}

const pushSupported = () =>
  "serviceWorker" in navigator && "PushManager" in window && "Notification" in window;

// Suscribe el navegador y manda la suscripción al backend. Devuelve true si quedó suscrito.
async function activarPush(tripId) {
  if (!pushSupported() || !tripId) return false;
  try {
    const { enabled, public_key } = await api.get("/push/public-key");
    if (!enabled || !public_key) return false;            // backend sin VAPID
    const permiso = await Notification.requestPermission();
    if (permiso !== "granted") return false;
    const reg = await navigator.serviceWorker.ready;
    let sub = await reg.pushManager.getSubscription();
    if (!sub) {
      sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(public_key),
      });
    }
    await api.post(`/trips/${tripId}/push/subscribe`, { subscription: sub.toJSON() });
    return true;
  } catch (e) {
    return false;
  }
}

async function desactivarPush(tripId) {
  try {
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.getSubscription();
    if (sub) {
      await api.post(`/trips/${tripId}/push/unsubscribe`, { subscription: sub.toJSON() });
      await sub.unsubscribe();
    }
  } catch (e) {}
}

function VoyraCompanion() {
  const [fase, setFase] = useState("setup");
  const [tripId, setTripId] = useState(null);
  const [viaje, setViaje] = useState({ ciudad: "Bogotá", hotel: "Hotel NH Collection Bogotá Teusaquillo", inicio: "2026-07-12", fin: "2026-07-18", vueloIda: "AV245", vueloRegreso: "AV244", pais: "Colombia", gustos: ["Gastronomía local", "Historia y cultura"] });

  // Stream conversacional unificado: mensajes, avisos proactivos y recomendaciones
  // en orden cronológico — el Companion "hablando", no bandejas separadas.
  const [stream, setStream] = useState([]);
  const seqRef = useRef(0);
  const appendStream = (item) => setStream((s) => [...s, { seq: seqRef.current++, ...item }]);

  const [input, setInput] = useState("");
  const [pensando, setPensando] = useState(false);
  const [evaluando, setEvaluando] = useState(null);
  const [pushUsados, setPushUsados] = useState(0);
  const [ubicacion, setUbicacion] = useState("En el hotel");
  const [zonaActual, setZonaActual] = useState("En el hotel");
  const [gpsEstado, setGpsEstado] = useState("inactivo"); // inactivo|buscando|ok|denegado|no_soportado|error|manual
  const [docs, setDocs] = useState([]);
  const [escuchando, setEscuchando] = useState(false);
  const [vozActiva, setVozActiva] = useState(false);
  const [subiendo, setSubiendo] = useState(false);
  const [cargandoCerca, setCargandoCerca] = useState(false);
  const [escaneando, setEscaneando] = useState(false);
  const [log, setLog] = useState([]);        // solo dev
  const [sheet, setSheet] = useState(null);   // null|'menu'|'location'|'dev'
  const [paso, setPaso] = useState(1);         // paso del onboarding
  const [airport, setAirport] = useState(null);   // datos del modo aeropuerto
  const [airportOpen, setAirportOpen] = useState(false);
  // Navegación por pestañas + secciones nuevas (Punto 3 UI)
  const [tab, setTab] = useState("inicio");        // inicio | planes | chat | mas
  const [sosOpen, setSosOpen] = useState(false);
  const [traductorOpen, setTraductorOpen] = useState(false);
  const [infoOpen, setInfoOpen] = useState(false);
  const [docsOpen, setDocsOpen] = useState(false);
  const [guiaVista, setGuiaVista] = useState(false);  // mini-guía de bienvenida
  const [coords, setCoords] = useState(null);          // {lat,lng} GPS para SOS/mapa
  const [pushOn, setPushOn] = useState(false);          // notificaciones push activas
  const [pushDisponible, setPushDisponible] = useState(false);  // backend tiene VAPID + navegador soporta

  const recRef = useRef(null);
  const fileRef = useRef(null);
  const scrollRef = useRef(null);

  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [stream, pensando]);

  const addLog = (entry) => setLog((l) => [{ ...entry, t: new Date().toLocaleTimeString("es-CO", { hour: "2-digit", minute: "2-digit", second: "2-digit" }) }, ...l]);
  const toggleGusto = (g) => setViaje((v) => ({ ...v, gustos: v.gustos.includes(g) ? v.gustos.filter((x) => x !== g) : [...v.gustos, g] }));

  const hablar = (texto) => {
    if (!vozActiva || !window.speechSynthesis) return;
    const u = new SpeechSynthesisUtterance(texto.replace(/[*_#]/g, ""));
    u.lang = "es-MX";
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(u);
  };

  const toggleMic = () => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { appendStream({ type: "companion", texto: "Tu navegador no soporta dictado por voz todavía. Escríbeme mientras tanto 🙂" }); return; }
    if (escuchando) { recRef.current && recRef.current.stop(); setEscuchando(false); return; }
    const rec = new SR();
    rec.lang = "es-419"; rec.interimResults = true; rec.continuous = false;
    rec.onresult = (e) => setInput(Array.from(e.results).map((r) => r[0].transcript).join(""));
    rec.onend = () => setEscuchando(false);
    rec.onerror = () => setEscuchando(false);
    recRef.current = rec; rec.start(); setEscuchando(true);
  };

  // ── GPS → backend (nearest_known_label calcula zona_actual real) ──
  const actualizarGPS = (announce = false) => {
    if (!tripId) return;
    if (!navigator.geolocation) { setGpsEstado("no_soportado"); return; }
    setGpsEstado("buscando");
    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        const { latitude, longitude } = pos.coords;
        setCoords({ lat: latitude, lng: longitude });
        try {
          const data = await api.post(`/trips/${tripId}/location`, { lat: latitude, lng: longitude, zona: ubicacion, disparar_geofence: false });
          setZonaActual(data.zona_actual);
          setGpsEstado("ok");
          if (esZonaAeropuerto(data.zona_actual)) cargarAeropuerto(true);
          addLog({ senal: "Ubicación GPS actualizada", fuente: "GPS del navegador", filtro: `Zona detectada: ${data.zona_actual}`, score: null, decision: "silencio" });
          if (announce) appendStream({ type: "system", texto: `Ahora cerca de ${data.zona_actual}` });
        } catch (e) {
          setGpsEstado("error");
          addLog({ senal: "Ubicación GPS", fuente: "GPS del navegador", filtro: "Error al contactar el backend", score: null, decision: "error", razon: e.message });
        }
      },
      (err) => {
        setGpsEstado(err.code === 1 ? "denegado" : "error");
        addLog({ senal: "Ubicación GPS", fuente: "GPS del navegador", filtro: err.code === 1 ? "Permiso denegado — usando zona manual" : `No se pudo obtener GPS: ${err.message}`, score: null, decision: "silencio" });
      },
      { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
    );
  };

  // Sincroniza ubicación inicial cuando nace el trip; intenta GPS, cae a manual.
  useEffect(() => {
    if (!tripId) return;
    setZonaActual(ubicacion);
    if (navigator.geolocation) {
      actualizarGPS(false);
    } else {
      setGpsEstado("no_soportado");
      (async () => { try { await api.post(`/trips/${tripId}/location`, { zona: ubicacion, disparar_geofence: false }); } catch {} })();
    }
  }, [tripId]);

  const cambiarZona = async (zona) => {
    setUbicacion(zona); setZonaActual(zona); setGpsEstado("manual");
    addLog({ senal: `Ubicación significativa: ${zona}`, fuente: "OS del teléfono", filtro: "Actualiza Trip Context — sin AI, costo cero", score: null, decision: "silencio" });
    if (tripId) { try { await api.post(`/trips/${tripId}/location`, { zona, disparar_geofence: false }); } catch {} }
    if (esZonaAeropuerto(zona)) cargarAeropuerto(true);
  };

  // ── Modo aeropuerto: timeline de llegada al aterrizar ──
  const esZonaAeropuerto = (z) => {
    const n = (z || "").toLowerCase();
    return n.includes("aeropuerto") || n.includes("dorado");
  };
  const cargarAeropuerto = async (auto = false) => {
    if (!tripId) return;
    try {
      const data = await api.get(`/trips/${tripId}/airport`);
      setAirport(data);
      if (data && data.disponible) {
        setSheet(null);
        setAirportOpen(true);
        if (auto) appendStream({ type: "companion", texto: `¡Bienvenido a ${data.city}! Veo que acabas de aterrizar. Te dejé abierta una guía paso a paso para salir de ${data.name} sin perderte ni que te cobren de más — mírala cuando quieras.` });
      } else if (!auto) {
        appendStream({ type: "companion", texto: (data && data.nota) || "Todavía no tengo guía de aeropuerto curada para esta ciudad." });
      }
    } catch (e) { /* silencioso: la llegada nunca debe romperse */ }
  };

  // ── Subida de confirmaciones (.txt) → Trip Context ──
  const subirDoc = async (file) => {
    if (!file || subiendo || !tripId) return;
    const esTexto = file.type === "text/plain" || file.name.toLowerCase().endsWith(".txt");
    if (!esTexto) { appendStream({ type: "companion", texto: "Por ahora puedo leer archivos de texto (.txt) — pega ahí el texto de tu confirmación. Fotos y PDFs llegan en la próxima versión." }); return; }
    setSubiendo(true);
    appendStream({ type: "user", texto: `📎 ${file.name}` });
    try {
      const text = await new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result); r.onerror = () => rej(new Error("read failed")); r.readAsText(file); }).catch(() => `[archivo binario: ${file.name}]`);
      const data = await api.post(`/trips/${tripId}/documents`, { filename: file.name, text_content: text.slice(0, 6000) });
      setDocs((d) => [...d, { nombre: file.name, tipo: data.tipo, resumen: data.resumen }]);
      appendStream({ type: "companion", texto: data.confirmacion });
      addLog({ senal: `Documento: ${file.name}`, fuente: "Usuario", filtro: `✓ Extraído (tipo: ${data.tipo})`, score: null, decision: "silencio" });
    } catch (e) {
      appendStream({ type: "companion", texto: "No pude leer ese archivo. ¿Probamos con el texto de la confirmación?" });
    }
    setSubiendo(false);
  };

  // ── Chat / acciones de 1 tap ──
  const enviar = async (display, apiTexto) => {
    const msgDisplay = (display || input).trim();
    const msgApi = (apiTexto || msgDisplay).trim();
    if (!msgDisplay || pensando || !tripId) return;
    setInput("");
    appendStream({ type: "user", texto: msgDisplay });
    setPensando(true);
    try {
      const data = await api.post(`/trips/${tripId}/chat`, { message: msgApi });
      appendStream({ type: "companion", texto: data.reply });
      hablar(data.reply);
    } catch (e) {
      appendStream({ type: "companion", texto: "Se me cruzaron los cables un segundo. ¿Me lo repites?" });
    }
    setPensando(false);
  };

  // ── "Qué hay cerca de mí" → /nearby (curación por distancia real) ──
  const buscarCerca = async () => {
    if (!tripId || cargandoCerca) return;
    setSheet(null);
    setCargandoCerca(true);
    appendStream({ type: "user", texto: "¿Qué hay cerca de mí ahora?" });
    try {
      const data = await api.post(`/trips/${tripId}/nearby`, {});
      const resultados = data.resultados || [];
      const zonaTxt = data.zona_actual || "tu zona";
      const recos = [];
      if (resultados.length === 0) {
        appendStream({ type: "companion", texto: data.nota || `Ya te mostré lo cercano a ${zonaTxt} en las últimas horas. Te aviso apenas aparezca algo nuevo.` });
      } else {
        resultados.forEach((r) => {
          const modo = suggestModeJS(r.distancia_km);
          const mapsLink = r.maps_link || (r.notification && r.notification.maps_link) || mapsLinkJS(r.lugar, viaje.ciudad, modo);
          const distTxt = r.distancia_km == null ? "distancia desconocida" : r.distancia_km < 0.05 ? "en tu zona" : `a ~${r.distancia_km} km de ti`;
          addLog({ senal: `Cerca: ${r.lugar} (${distTxt})`, fuente: "Curación de destino", filtro: r.filter !== "pass" ? `✕ Filtro: ${r.filter}` : `✓ Pasa — score ${r.score}`, score: r.score, razon: r.reason, decision: r.decision });
          if (r.notification && r.notification.kind === "push") {
            const n = r.notification;
            appendStream({ type: "push", id: n.id, titulo: n.title, mensaje: n.body, accion: n.action, operativo: false, lugar: r.lugar, distancia_km: r.distancia_km, mapsLink });
            setPushUsados((p) => p + 1);
          } else {
            recos.push({ lugar: r.lugar, mensaje: distTxt + (r.reason ? ` · ${r.reason}` : ""), mapsLink, distancia_km: r.distancia_km });
          }
        });
        if (recos.length) appendStream({ type: "recos", zona: zonaTxt, items: recos });
      }
    } catch (e) {
      appendStream({ type: "companion", texto: "No pude revisar tu zona ahora mismo. Reintenta en un momento." });
      addLog({ senal: "Qué hay cerca", fuente: "Curación de destino", filtro: "Error de backend", score: null, decision: "error", razon: e.message });
    }
    setCargandoCerca(false);
  };

  // ── DEV: check-in nocturno (en prod lo dispara el cron de las 8pm) ──
  const checkInNocturno = async () => {
    if (pensando || !tripId) return;
    setPensando(true);
    addLog({ senal: "Check-in nocturno", fuente: "Cron 8pm", filtro: "✓ Rutina diaria de contexto", score: null, decision: "push" });
    try {
      const data = await api.post(`/trips/${tripId}/checkin`, {});
      appendStream({ type: "push", id: `checkin-${Date.now()}`, titulo: "Tu Companion", mensaje: data.message, accion: null, operativo: false });
      hablar(data.message);
    } catch (e) {
      appendStream({ type: "companion", texto: "¿Qué planes tienes para mañana? Así te organizo el día." });
    }
    setPensando(false);
  };

  // ── DEV: motor de relevancia (en prod lo disparan los watchers) ──
  const evaluar = async (senal) => {
    if (evaluando || !tripId) return;
    setEvaluando(senal.id);
    const zonaGeo = ubicacion === "En el hotel" ? "La Candelaria" : ubicacion;
    const payloadFinal = senal.id === "geofence"
      ? `El usuario acaba de entrar caminando a la zona "${zonaGeo}" de ${viaje.ciudad}. Son las 12:45 del mediodía.`
      : senal.payload;
    if (senal.id === "geofence" && ubicacion === "En el hotel") setUbicacion("La Candelaria");
    try {
      if (senal.id === "geofence") await api.post(`/trips/${tripId}/location`, { zona: zonaGeo, disparar_geofence: false });
      const data = await api.post(`/trips/${tripId}/signals`, { source: senal.fuente, category: senal.categoria, operational: senal.operativo, payload: payloadFinal });
      addLog({ senal: senal.nombre, fuente: senal.fuente, filtro: data.filter !== "pass" ? `✕ Filtro: ${data.filter}` : `✓ Pasa — score ${data.score}`, score: data.score, razon: data.reason, decision: data.decision });
      if (data.notification) {
        const n = data.notification;
        if (n.kind === "push") {
          appendStream({ type: "push", id: n.id, titulo: n.title, mensaje: n.body, accion: n.action, operativo: senal.operativo, mapsLink: n.maps_link });
          if (!senal.operativo) setPushUsados((p) => p + 1);
        } else if (n.kind === "feed") {
          appendStream({ type: "card", titulo: n.title, mensaje: n.body, accion: n.action });
        }
      }
    } catch (e) {
      addLog({ senal: senal.nombre, fuente: senal.fuente, filtro: "Error de backend", score: null, decision: "error", razon: e.message });
    }
    setEvaluando(null);
  };

  // ── DEV: escanear destino → /scan ──
  const escanearDestino = async () => {
    if (!tripId || escaneando) return;
    setEscaneando(true);
    try {
      const data = await api.post(`/trips/${tripId}/scan`, {});
      const resultados = data.resultados || [];
      if (resultados.length === 0) {
        addLog({ senal: "Escaneo del destino", fuente: `Tavily (${data.search_mode || "?"})`, filtro: `${data.procesados ?? 0}/${data.encontrados ?? 0} procesados.`, score: null, decision: "silencio" });
      } else {
        resultados.forEach((r) => {
          const esNoticia = r.tipo === "noticia";
          addLog({ senal: `${esNoticia ? "Noticia" : "Tendencia"}: ${r.fuente}`, fuente: esNoticia ? "News watcher" : "Destination Scanner", filtro: r.filter !== "pass" ? `✕ Filtro: ${r.filter}` : `✓ Pasa — score ${r.score}`, score: r.score, razon: r.reason, decision: r.decision });
          if (r.notification) {
            const n = r.notification;
            if (n.kind === "push") { appendStream({ type: "push", id: n.id, titulo: n.title, mensaje: n.body, accion: n.action, operativo: esNoticia }); setPushUsados((p) => p + 1); }
            else appendStream({ type: "card", titulo: n.title, mensaje: n.body, accion: n.action });
          }
        });
      }
    } catch (e) {
      addLog({ senal: "Escaneo del destino", fuente: "Tavily", filtro: "Error de backend", score: null, decision: "error", razon: e.message });
    }
    setEscaneando(false);
  };

  const reiniciar = () => {
    setSheet(null); setFase("setup"); setPaso(1); setTripId(null); setStream([]); seqRef.current = 0;
    setLog([]); setPushUsados(0); setUbicacion("En el hotel"); setZonaActual("En el hotel");
    setGpsEstado("inactivo"); setDocs([]); setVozActiva(false); setCargandoCerca(false); setEscaneando(false);
  };

  // Días del viaje para el calendario de Planes (de 'inicio' a 'fin').
  // IMPORTANTE: debe ir ANTES de cualquier `return` condicional para que el
  // orden de hooks sea idéntico en todos los renders (setup y agente).
  const diasViaje = React.useMemo(() => {
    const out = [];
    try {
      const ini = new Date(viaje.inicio + "T12:00:00");
      const fin = new Date(viaje.fin + "T12:00:00");
      for (let d = new Date(ini); d <= fin; d.setDate(d.getDate() + 1)) {
        const dd = new Date(d);
        out.push({ date: dd, iso: dd.toISOString().slice(0, 10), planes: [] });
      }
    } catch (e) {}
    return out;
  }, [viaje.inicio, viaje.fin]);

  // Notificaciones push: activar/desactivar
  const togglePush = async () => {
    if (pushOn) {
      await desactivarPush(tripId);
      setPushOn(false);
    } else {
      const ok = await activarPush(tripId);
      setPushOn(ok);
      if (!ok && Notification.permission === "denied") {
        appendStream({ type: "system", texto: "Las notificaciones están bloqueadas. Actívalas en los ajustes de tu navegador." });
      }
    }
  };

  // ════════════════ ONBOARDING ════════════════
  if (fase === "setup") {
    const paso1ok = viaje.ciudad.trim() && viaje.hotel.trim() && viaje.inicio && viaje.fin;
    const Campo = ({ label, k, ph, type }) => (
      <div style={{ minWidth: 0 }}>
        <label style={{ fontSize: 11.5, fontWeight: 600, color: C.inkSoft, letterSpacing: "0.03em" }}>{label}</label>
        <input type={type || "text"} value={viaje[k]} onChange={(e) => setViaje({ ...viaje, [k]: e.target.value })} placeholder={ph}
          style={{ width: "100%", minWidth: 0, border: `1px solid ${C.line}`, borderRadius: 12, padding: type === "date" ? "12px 10px" : "12px 14px", marginTop: 5, fontSize: type === "date" ? 14.5 : 16, background: C.bg, color: C.ink, outline: "none", boxSizing: "border-box", WebkitAppearance: "none", appearance: "none" }} />
      </div>
    );
    const activar = async () => {
      try {
        const data = await api.post("/trips", { ciudad: viaje.ciudad.trim(), hotel: viaje.hotel.trim(), inicio: viaje.inicio, fin: viaje.fin, vuelo_ida: viaje.vueloIda.trim(), vuelo_regreso: viaje.vueloRegreso.trim(), pais: viaje.pais.trim() || "Colombia", gustos: viaje.gustos });
        setTripId(data.trip_id);
        appendStream({ type: "companion", texto: data.greeting });
        setTab("inicio");
        setGuiaVista(true);
        setFase("agente");
        // ¿El navegador soporta push y el backend tiene VAPID? Para ofrecerlo.
        (async () => {
          try {
            if (!pushSupported()) return;
            const pk = await api.get("/push/public-key");
            if (pk.enabled) {
              setPushDisponible(true);
              const reg = await navigator.serviceWorker.ready;
              const sub = await reg.pushManager.getSubscription();
              setPushOn(!!sub && Notification.permission === "granted");
            }
          } catch (e) {}
        })();
      } catch (e) {
        alert("No pude conectar con tu Companion. Revisa que el backend esté arriba.");
      }
    };

    return (
      <div style={{ minHeight: "100dvh", background: C.bg, color: C.ink, overflowY: "auto" }} className="no-scrollbar">
        <div style={{ maxWidth: 440, margin: "0 auto", padding: "max(20px, env(safe-area-inset-top)) 22px 36px", display: "flex", flexDirection: "column", minHeight: "100dvh", boxSizing: "border-box" }}>

          {/* marca + progreso */}
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginTop: 6 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              {paso === 2 && (
                <button onClick={() => setPaso(1)} style={{ border: "none", background: "none", fontSize: 22, color: C.inkSoft, cursor: "pointer", lineHeight: 1, padding: 0, marginRight: 2 }}>‹</button>
              )}
              <div style={{ fontWeight: 800, fontSize: 20, letterSpacing: "-0.02em" }}>Voyra</div>
            </div>
            <div style={{ display: "flex", gap: 6 }}>
              {[1, 2].map((n) => (
                <div key={n} style={{ width: n === paso ? 22 : 7, height: 7, borderRadius: 999, background: n === paso ? C.orange : C.line, transition: "width .25s" }} />
              ))}
            </div>
          </div>

          {/* héroe: el personaje */}
          <div className="rise" style={{ textAlign: "center", marginTop: 18 }}>
            <Mark size={92} pulse />
          </div>

          {paso === 1 ? (
            <div key="p1" className="rise" style={{ marginTop: 6 }}>
              <h1 style={{ fontSize: 25, fontWeight: 700, lineHeight: 1.2, letterSpacing: "-0.02em", textAlign: "center", margin: 0 }}>Hola, soy tu Companion.<br />¿A dónde vamos?</h1>
              <p style={{ color: C.inkSoft, marginTop: 10, fontSize: 14.5, lineHeight: 1.5, textAlign: "center" }}>Solo lo esencial. Te acompaño <b style={{ color: C.ink }}>durante todo el viaje</b>, no solo antes.</p>

              <div style={{ background: C.card, border: `1px solid ${C.line}`, borderRadius: 20, padding: 18, marginTop: 20 }}>
                <div className="space-y-4">
                  {Campo({ label: "¿A DÓNDE VAS?", k: "ciudad", ph: "Bogotá" })}
                  {Campo({ label: "¿DÓNDE TE ALOJAS?", k: "hotel", ph: "Nombre del hotel" })}
                  <div className="flex gap-3">
                    <div className="flex-1 min-w-0">{Campo({ label: "LLEGADA", k: "inicio", type: "date" })}</div>
                    <div className="flex-1 min-w-0">{Campo({ label: "REGRESO", k: "fin", type: "date" })}</div>
                  </div>
                </div>
              </div>

              <button onClick={() => paso1ok && setPaso(2)} disabled={!paso1ok}
                style={{ width: "100%", background: paso1ok ? C.orange : C.line, color: paso1ok ? "#fff" : C.inkSoft, border: "none", borderRadius: 14, padding: "15px 0", fontSize: 16, fontWeight: 700, cursor: paso1ok ? "pointer" : "default", marginTop: 18 }}>
                Siguiente
              </button>
            </div>
          ) : (
            <div key="p2" className="rise" style={{ marginTop: 6 }}>
              <h1 style={{ fontSize: 24, fontWeight: 700, lineHeight: 1.2, letterSpacing: "-0.02em", textAlign: "center", margin: 0 }}>Un par de cosas más<br />y quedamos listos.</h1>
              <p style={{ color: C.inkSoft, marginTop: 10, fontSize: 14.5, lineHeight: 1.5, textAlign: "center" }}>Todo esto es opcional — afina cómo te acompaño. Puedes saltarlo.</p>

              <div style={{ background: C.card, border: `1px solid ${C.line}`, borderRadius: 20, padding: 18, marginTop: 20 }}>
                <div className="space-y-4">
                  <div>
                    <label style={{ fontSize: 11.5, fontWeight: 600, color: C.inkSoft, letterSpacing: "0.03em" }}>TUS VUELOS <span style={{ fontWeight: 400, textTransform: "none" }}>· solo el número, yo veo el resto</span></label>
                    <div className="flex gap-3" style={{ marginTop: 5 }}>
                      <input value={viaje.vueloIda} onChange={(e) => setViaje({ ...viaje, vueloIda: e.target.value })} placeholder="Ida · AV245"
                        style={{ flex: 1, minWidth: 0, border: `1px solid ${C.line}`, borderRadius: 12, padding: "12px 14px", fontSize: 16, background: C.bg, color: C.ink, outline: "none", boxSizing: "border-box" }} />
                      <input value={viaje.vueloRegreso} onChange={(e) => setViaje({ ...viaje, vueloRegreso: e.target.value })} placeholder="Regreso · AV244"
                        style={{ flex: 1, minWidth: 0, border: `1px solid ${C.line}`, borderRadius: 12, padding: "12px 14px", fontSize: 16, background: C.bg, color: C.ink, outline: "none", boxSizing: "border-box" }} />
                    </div>
                  </div>
                  {Campo({ label: "PAÍS DE ORIGEN · para emergencias", k: "pais", ph: "Colombia" })}
                  <div>
                    <label style={{ fontSize: 11.5, fontWeight: 600, color: C.inkSoft, letterSpacing: "0.03em" }}>¿QUÉ TE GUSTA?</label>
                    <div className="flex flex-wrap gap-2 mt-2">
                      {GUSTOS.map((g) => {
                        const on = viaje.gustos.includes(g);
                        return (
                          <button key={g} onClick={() => toggleGusto(g)}
                            style={{ fontSize: 13, padding: "7px 13px", borderRadius: 999, border: `1px solid ${on ? C.orange : C.line}`, background: on ? C.orangeSoft : C.card, color: on ? C.orangeDeep : C.inkSoft, fontWeight: on ? 600 : 500, cursor: "pointer" }}>
                            {g}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                </div>
              </div>

              <button onClick={activar}
                style={{ width: "100%", background: C.orange, color: "#fff", border: "none", borderRadius: 14, padding: "15px 0", fontSize: 16, fontWeight: 700, cursor: "pointer", marginTop: 18, boxShadow: "0 6px 18px " + C.orange + "44" }}>
                Activar mi Companion
              </button>
              <button onClick={activar} style={{ width: "100%", background: "none", border: "none", color: C.inkSoft, fontSize: 14, fontWeight: 600, cursor: "pointer", marginTop: 10 }}>
                Omitir y activar
              </button>
            </div>
          )}

          <p style={{ fontSize: 12, color: C.inkSoft, textAlign: "center", marginTop: "auto", paddingTop: 18 }}>Ubicación inteligente: menos del 2% de batería al día. Sin GPS continuo.</p>
        </div>
      </div>
    );
  }

  // ════════════════ COMPANION ACTIVO ════════════════
  const gpsChip = {
    ok: { txt: `${zonaActual}`, sub: "GPS", color: C.teal },
    buscando: { txt: "Ubicándote…", sub: "", color: C.inkSoft },
    manual: { txt: `${zonaActual}`, sub: "manual", color: C.inkSoft },
    inactivo: { txt: `${zonaActual}`, sub: "manual", color: C.inkSoft },
    denegado: { txt: `${zonaActual}`, sub: "sin GPS", color: C.inkSoft },
    no_soportado: { txt: `${zonaActual}`, sub: "manual", color: C.inkSoft },
    error: { txt: `${zonaActual}`, sub: "sin GPS", color: C.inkSoft },
  }[gpsEstado] || { txt: zonaActual, sub: "", color: C.inkSoft };

  const QUICK = [
    { q: "Estoy perdido", urgente: true },
    { q: "Emergencia médica", urgente: true },
    { q: "Perdí mis documentos", urgente: true },
    { q: "Qué hay cerca", nearby: true },
    { q: "Restaurantes cerca" },
    { q: "¿Cómo llego al aeropuerto?" },
  ];

  return (
    <div style={{ height: "100dvh", display: "flex", flexDirection: "column", background: C.bg, color: C.ink, maxWidth: 480, margin: "0 auto", position: "relative", boxShadow: "0 0 0 1px " + C.line }}>

      {/* ── HEADER ── */}
      <div style={{ paddingTop: "env(safe-area-inset-top)", background: C.card, borderBottom: `1px solid ${C.line}`, flexShrink: 0 }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "10px 14px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 9 }}>
            <Mark size={30} />
            <div>
              <div style={{ fontWeight: 800, fontSize: 16, letterSpacing: "-0.02em", lineHeight: 1 }}>Voyra</div>
              <div style={{ fontSize: 11, color: C.teal, fontWeight: 600, marginTop: 2 }}>● activo en {viaje.ciudad}</div>
            </div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
            <button onClick={() => { setVozActiva(!vozActiva); if (vozActiva && window.speechSynthesis) window.speechSynthesis.cancel(); }}
              title="Leer respuestas en voz alta"
              style={{ border: `1px solid ${vozActiva ? C.teal : C.line}`, background: vozActiva ? C.tealSoft : C.card, color: vozActiva ? C.teal : C.inkSoft, borderRadius: 999, width: 38, height: 38, fontSize: 16, cursor: "pointer" }}>
              {vozActiva ? "🔊" : "🔈"}
            </button>
            <button onClick={() => setSheet("menu")} title="Más opciones"
              style={{ border: `1px solid ${C.line}`, background: C.card, color: C.ink, borderRadius: 999, width: 38, height: 38, fontSize: 18, cursor: "pointer", lineHeight: 1 }}>⋯</button>
          </div>
        </div>
        {/* barra de ubicación */}
        <button onClick={() => setSheet("location")}
          style={{ width: "100%", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8, padding: "8px 14px", background: C.bg, border: "none", borderTop: `1px solid ${C.line}`, cursor: "pointer", textAlign: "left" }}>
          <span style={{ fontSize: 13, color: C.ink, display: "flex", alignItems: "center", gap: 6, minWidth: 0 }}>
            <span style={{ fontSize: 14 }}>📍</span>
            <b style={{ whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{gpsChip.txt}</b>
            {gpsChip.sub && <span style={{ color: gpsChip.color, fontSize: 11.5, fontWeight: 600, border: `1px solid ${gpsChip.color}44`, borderRadius: 999, padding: "1px 7px", flexShrink: 0 }}>{gpsChip.sub}</span>}
          </span>
          <span style={{ fontSize: 12.5, color: C.teal, fontWeight: 600, flexShrink: 0 }}>Cambiar ›</span>
        </button>
      </div>

      {/* ── INICIO (home) ── */}
      {tab === "inicio" && (
        <HomeView
          viaje={viaje} zonaActual={zonaActual} airport={airport} diasViaje={diasViaje}
          pushDisponible={pushDisponible} pushOn={pushOn} onActivarPush={togglePush}
          onChat={() => setTab("chat")}
          onCerca={() => { setTab("chat"); buscarCerca(); }}
          onAirport={() => { airport && airport.disponible ? setAirportOpen(true) : cargarAeropuerto(false); }}
          onPlanes={() => setTab("planes")}
          onSOS={() => setSosOpen(true)}
          onTraductor={() => setTraductorOpen(true)}
          onInfo={() => setInfoOpen(true)}
        />
      )}

      {/* ── PLANES (calendario) ── */}
      {tab === "planes" && (
        <PlanesView viaje={viaje} diasViaje={diasViaje} onChat={() => setTab("chat")} />
      )}

      {/* ── MÁS ── */}
      {tab === "mas" && (
        <MasView
          viaje={viaje} docs={docs} vozActiva={vozActiva} debug={DEBUG}
          pushDisponible={pushDisponible} pushOn={pushOn} onTogglePush={togglePush}
          onToggleVoz={() => { setVozActiva(!vozActiva); if (vozActiva && window.speechSynthesis) window.speechSynthesis.cancel(); }}
          onUbicacion={() => setSheet("location")}
          onInfo={() => setInfoOpen(true)}
          onDocs={() => setDocsOpen(true)}
          onSOS={() => setSosOpen(true)}
          onTraductor={() => setTraductorOpen(true)}
          onReiniciar={reiniciar}
          onDev={() => setSheet("dev")}
        />
      )}

      {/* ── CHAT ── */}
      {tab === "chat" && <>
      {/* ── CONVERSACIÓN ── */}
      <div ref={scrollRef} className="no-scrollbar" style={{ flex: 1, overflowY: "auto", padding: "16px 14px", display: "flex", flexDirection: "column", gap: 12 }}>
        {stream.length === 0 && (
          <div style={{ color: C.inkSoft, fontSize: 14, textAlign: "center", margin: "auto", padding: "0 24px", lineHeight: 1.5 }}>
            <Mark size={40} pulse />
            <div style={{ marginTop: 12 }}>Estoy despierto y siguiendo tu viaje. Pregúntame lo que quieras o toca <b>“Qué hay cerca”</b>.</div>
          </div>
        )}

        {stream.map((m) => {
          if (m.type === "user")
            return (
              <div key={m.seq} className="rise" style={{ alignSelf: "flex-end", maxWidth: "82%", background: C.ink, color: "#fff", borderRadius: "16px 16px 4px 16px", padding: "9px 13px", fontSize: 14.5, lineHeight: 1.45, whiteSpace: "pre-wrap" }}>
                {m.texto}
              </div>
            );
          if (m.type === "companion")
            return (
              <div key={m.seq} className="rise" style={{ alignSelf: "flex-start", display: "flex", gap: 8, maxWidth: "90%" }}>
                <div style={{ flexShrink: 0, marginTop: 2 }}><Mark size={26} /></div>
                <div style={{ background: C.card, border: `1px solid ${C.line}`, borderRadius: "16px 16px 16px 4px", padding: "10px 13px", fontSize: 14.5, lineHeight: 1.5, whiteSpace: "pre-wrap" }}>{m.texto}</div>
              </div>
            );
          if (m.type === "system")
            return (
              <div key={m.seq} className="rise" style={{ alignSelf: "center", fontSize: 12, color: C.inkSoft, background: C.card, border: `1px solid ${C.line}`, borderRadius: 999, padding: "4px 12px" }}>
                📍 {m.texto}
              </div>
            );
          if (m.type === "push") {
            const op = m.operativo;
            return (
              <div key={m.seq} className="rise" style={{ alignSelf: "stretch", display: "flex", gap: 8 }}>
                <div style={{ flexShrink: 0, marginTop: 2 }}><Mark size={26} bg={op ? C.coral : C.teal} /></div>
                <div style={{ flex: 1, background: op ? C.coralSoft : C.tealSoft, border: `1px solid ${op ? C.coral : C.teal}33`, borderLeft: `3px solid ${op ? C.coral : C.teal}`, borderRadius: 14, padding: "11px 13px" }}>
                  <div style={{ fontSize: 10.5, fontWeight: 700, color: op ? C.coral : C.teal, letterSpacing: "0.07em" }}>{op ? "ALERTA DE VIAJE" : "TU COMPANION"}</div>
                  <div style={{ fontWeight: 700, fontSize: 14.5, marginTop: 3 }}>{m.titulo}</div>
                  <div style={{ fontSize: 14, color: C.ink, marginTop: 3, lineHeight: 1.45 }}>{m.mensaje}</div>
                  {((m.accion && m.accion !== "null") || m.mapsLink) && (
                    <div style={{ marginTop: 9, display: "flex", gap: 8, flexWrap: "wrap" }}>
                      {m.accion && m.accion !== "null" && (
                        <button onClick={() => enviar(m.accion, `[Tocó "${m.accion}" en esta notificación] ${m.titulo}: ${m.mensaje}`)}
                          style={{ background: op ? C.coral : C.teal, color: "#fff", border: "none", borderRadius: 999, padding: "8px 15px", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>{m.accion}</button>
                      )}
                      {m.mapsLink && (
                        <a href={m.mapsLink} target="_blank" rel="noopener noreferrer"
                          style={{ background: "transparent", color: op ? C.coral : C.teal, border: `1px solid ${op ? C.coral : C.teal}`, borderRadius: 999, padding: "8px 15px", fontSize: 13, fontWeight: 600, textDecoration: "none" }}>📍 Cómo llegar{distLabel(m.distancia_km)}</a>
                      )}
                    </div>
                  )}
                </div>
              </div>
            );
          }
          if (m.type === "card")
            return (
              <div key={m.seq} className="rise" style={{ alignSelf: "stretch", display: "flex", gap: 8 }}>
                <div style={{ flexShrink: 0, marginTop: 2 }}><Mark size={26} bg={C.amber} /></div>
                <div style={{ flex: 1, background: C.card, border: `1px solid ${C.line}`, borderLeft: `3px solid ${C.amber}`, borderRadius: 14, padding: "11px 13px" }}>
                  <div style={{ fontSize: 10.5, fontWeight: 700, color: C.amber, letterSpacing: "0.07em" }}>PARA TI</div>
                  <div style={{ fontWeight: 700, fontSize: 14.5, marginTop: 3 }}>{m.titulo}</div>
                  <div style={{ fontSize: 14, color: C.ink, marginTop: 3, lineHeight: 1.45 }}>{m.mensaje}</div>
                  {m.accion && m.accion !== "null" && (
                    <button onClick={() => enviar(m.accion, `[Tocó "${m.accion}"] ${m.titulo}: ${m.mensaje}`)}
                      style={{ marginTop: 9, background: C.amber, color: "#fff", border: "none", borderRadius: 999, padding: "8px 15px", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>{m.accion}</button>
                  )}
                </div>
              </div>
            );
          if (m.type === "recos")
            return (
              <div key={m.seq} className="rise" style={{ alignSelf: "stretch", display: "flex", gap: 8 }}>
                <div style={{ flexShrink: 0, marginTop: 2 }}><Mark size={26} /></div>
                <div style={{ flex: 1, background: C.card, border: `1px solid ${C.line}`, borderRadius: "16px 16px 16px 4px", padding: "11px 13px" }}>
                  <div style={{ fontSize: 10.5, fontWeight: 700, color: C.teal, letterSpacing: "0.07em" }}>CERCA DE TI · {(m.zona || "").toUpperCase()}</div>
                  <div style={{ marginTop: 6, display: "flex", flexDirection: "column", gap: 10 }}>
                    {m.items.map((it, i) => (
                      <div key={i} style={{ borderTop: i ? `1px solid ${C.line}` : "none", paddingTop: i ? 10 : 0 }}>
                        <div style={{ fontWeight: 700, fontSize: 14 }}>{it.lugar}</div>
                        <div style={{ fontSize: 13, color: C.inkSoft, marginTop: 1, lineHeight: 1.4 }}>{it.mensaje}</div>
                        {it.mapsLink && (
                          <a href={it.mapsLink} target="_blank" rel="noopener noreferrer" style={{ display: "inline-block", marginTop: 5, fontSize: 12.5, color: C.teal, fontWeight: 600, textDecoration: "none" }}>📍 Cómo llegar{distLabel(it.distancia_km)} →</a>
                        )}
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            );
          return null;
        })}

        {(pensando || cargandoCerca) && (
          <div style={{ alignSelf: "flex-start", display: "flex", gap: 8, alignItems: "center" }}>
            <div style={{ flexShrink: 0 }}><Mark size={26} /></div>
            <div style={{ background: C.card, border: `1px solid ${C.line}`, borderRadius: "16px 16px 16px 4px", padding: "10px 13px" }}><Typing /></div>
          </div>
        )}
      </div>

      {/* ── COMPOSER ── */}
      <div style={{ flexShrink: 0, background: C.card, borderTop: `1px solid ${C.line}`, paddingBottom: "env(safe-area-inset-bottom)" }}>
        <div className="no-scrollbar" style={{ display: "flex", gap: 7, overflowX: "auto", padding: "10px 12px 2px" }}>
          {QUICK.map((a) => (
            <button key={a.q} onClick={() => a.nearby ? buscarCerca() : enviar(a.q)} disabled={pensando || cargandoCerca}
              style={{ flexShrink: 0, fontSize: 12.5, padding: "6px 12px", borderRadius: 999, border: `1px solid ${a.urgente ? C.coral : a.nearby ? C.teal : C.line}`, background: a.urgente ? C.coralSoft : a.nearby ? C.tealSoft : C.bg, color: a.urgente ? C.coral : a.nearby ? C.teal : C.inkSoft, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap" }}>
              {a.nearby ? "📍 " : ""}{a.q}
            </button>
          ))}
        </div>
        <div style={{ padding: "8px 12px 12px", display: "flex", gap: 7, alignItems: "center" }}>
          <input ref={fileRef} type="file" accept=".txt,text/plain" style={{ display: "none" }} onChange={(e) => { subirDoc(e.target.files[0]); e.target.value = ""; }} />
          <button onClick={() => fileRef.current && fileRef.current.click()} disabled={subiendo} title="Subir confirmación de reserva (.txt)"
            style={{ border: `1px solid ${C.line}`, background: C.bg, borderRadius: 999, width: 40, height: 40, fontSize: 17, cursor: "pointer", flexShrink: 0 }}>{subiendo ? "…" : "+"}</button>
          <button onClick={toggleMic} title="Hablarle al Companion"
            style={{ border: `1px solid ${escuchando ? C.coral : C.line}`, background: escuchando ? C.coralSoft : C.bg, borderRadius: 999, width: 40, height: 40, fontSize: 16, cursor: "pointer", flexShrink: 0 }}>{escuchando ? "⏺" : "🎙"}</button>
          <input value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => e.key === "Enter" && enviar()}
            placeholder={escuchando ? "Escuchando…" : "Escríbele a tu Companion"}
            style={{ flex: 1, minWidth: 0, border: `1px solid ${escuchando ? C.coral : C.line}`, borderRadius: 999, padding: "11px 15px", fontSize: 15, outline: "none", background: C.bg, color: C.ink }} />
          <button onClick={() => enviar()} style={{ background: C.teal, color: "#fff", border: "none", borderRadius: 999, width: 40, height: 40, fontWeight: 700, fontSize: 18, cursor: "pointer", flexShrink: 0 }}>↑</button>
        </div>
      </div>
      </>}

      {/* ── BARRA DE PESTAÑAS ── */}
      <BottomTabs tab={tab} setTab={setTab} />

      {/* ── SECCIONES A PANTALLA COMPLETA ── */}
      {sosOpen && <SosView viaje={viaje} zonaActual={zonaActual} gpsEstado={gpsEstado} coords={coords} onClose={() => setSosOpen(false)} onChat={() => { setSosOpen(false); setTab("chat"); }} />}
      {traductorOpen && <TraductorView onClose={() => setTraductorOpen(false)} />}
      {infoOpen && <InfoView viaje={viaje} onClose={() => setInfoOpen(false)} />}
      {docsOpen && <DocsView viaje={viaje} docs={docs} subiendo={subiendo} onClose={() => setDocsOpen(false)} onSubir={() => fileRef.current && fileRef.current.click()} />}
      {guiaVista && <MiniGuia onClose={() => setGuiaVista(false)} />}

      {/* ── SHEETS ── */}
      {airportOpen && airport && airport.disponible && <AirportView data={airport} onClose={() => setAirportOpen(false)} />}

      {sheet && <div onClick={() => setSheet(null)} style={{ position: "absolute", inset: 0, background: "rgba(23,36,47,.38)", zIndex: 40 }} />}

      {sheet === "menu" && (
        <Sheet onClose={() => setSheet(null)} title="Opciones">
          <SheetItem icon="📍" label="Qué hay cerca de mí ahora" onClick={buscarCerca} />
          <SheetItem icon="🛬" label="Guía de llegada al aeropuerto" onClick={() => { setSheet(null); airport && airport.disponible ? setAirportOpen(true) : cargarAeropuerto(false); }} />
          <SheetItem icon="🧭" label="Cambiar mi zona / GPS" onClick={() => setSheet("location")} />
          <SheetItem icon={vozActiva ? "🔊" : "🔈"} label={`Leer en voz alta: ${vozActiva ? "activado" : "desactivado"}`} onClick={() => { setVozActiva(!vozActiva); if (vozActiva && window.speechSynthesis) window.speechSynthesis.cancel(); }} />
          {docs.length > 0 && <div style={{ fontSize: 12, color: C.inkSoft, padding: "8px 4px 2px" }}>{docs.length} confirmación(es) en tu Trip Context</div>}
          {DEBUG && <SheetItem icon="🛠" label="Panel de desarrollo" onClick={() => setSheet("dev")} />}
          <SheetItem icon="↺" label="Reiniciar con otro viaje" danger onClick={reiniciar} />
        </Sheet>
      )}

      {sheet === "location" && (
        <Sheet onClose={() => setSheet(null)} title="Tu ubicación">
          <div style={{ fontSize: 13.5, color: C.inkSoft, lineHeight: 1.5, marginBottom: 12 }}>
            Uso tu zona para decirte qué hay cerca y medir distancias reales. El GPS es lo más preciso; si no, elígela a mano.
          </div>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8, marginBottom: 10 }}>
            <div style={{ fontSize: 14 }}>
              {gpsEstado === "ok" && <span><b>📍 {zonaActual}</b> <span style={{ color: C.teal, fontSize: 12 }}>· GPS real</span></span>}
              {gpsEstado === "buscando" && <span style={{ color: C.inkSoft }}>📍 Buscando tu ubicación…</span>}
              {gpsEstado === "denegado" && <span style={{ color: C.inkSoft }}>📍 Sin permiso de GPS — zona manual</span>}
              {gpsEstado === "no_soportado" && <span style={{ color: C.inkSoft }}>📍 GPS no disponible aquí</span>}
              {gpsEstado === "error" && <span style={{ color: C.inkSoft }}>📍 No se pudo obtener el GPS</span>}
              {(gpsEstado === "manual" || gpsEstado === "inactivo") && <span><b>📍 {zonaActual}</b> <span style={{ color: C.inkSoft, fontSize: 12 }}>· manual</span></span>}
            </div>
            <button onClick={() => actualizarGPS(true)} disabled={gpsEstado === "buscando" || !tripId}
              style={{ border: `1px solid ${C.teal}`, color: C.teal, background: C.tealSoft, borderRadius: 10, padding: "7px 12px", fontSize: 13, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap" }}>🔄 Usar GPS</button>
          </div>
          <select value={ubicacion} onChange={(e) => cambiarZona(e.target.value)}
            style={{ width: "100%", border: `1px solid ${C.line}`, borderRadius: 12, padding: "12px 13px", fontSize: 15, background: C.bg, color: C.ink, outline: "none" }}>
            {ZONAS.map((z) => <option key={z} value={z}>{z}</option>)}
          </select>
          <button onClick={buscarCerca} disabled={cargandoCerca || !tripId}
            style={{ width: "100%", marginTop: 12, background: C.teal, color: "#fff", border: "none", borderRadius: 12, padding: "13px 0", fontSize: 15, fontWeight: 700, cursor: "pointer" }}>{cargandoCerca ? "Buscando…" : "📍 Ver qué hay cerca"}</button>
        </Sheet>
      )}

      {sheet === "dev" && DEBUG && (
        <Sheet onClose={() => setSheet(null)} title="Panel de desarrollo" wide>
          <div style={{ fontSize: 11.5, color: C.inkSoft, marginBottom: 10, fontFamily: "ui-monospace, monospace" }}>
            backend: {API}{tripId ? ` · trip: ${tripId}` : ""} · push hoy: {pushUsados}/{PRESUPUESTO_DIARIO}
          </div>
          <div style={{ fontSize: 11, fontWeight: 700, color: C.inkSoft, letterSpacing: "0.08em", marginBottom: 6 }}>WATCHERS — disparar señal</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 7 }}>
            <button onClick={checkInNocturno} disabled={pensando} style={devBtn(C.teal)}>{pensando ? "Generando…" : "🌙 Check-in nocturno (/checkin)"}</button>
            <button onClick={escanearDestino} disabled={escaneando} style={devBtn(C.amber)}>{escaneando ? "Escaneando…" : "🔎 Escanear destino (/scan)"}</button>
          </div>
          <div className="grid grid-cols-2 gap-2 mt-2">
            {SENALES.map((s) => (
              <button key={s.id} onClick={() => evaluar(s)} disabled={!!evaluando}
                style={{ textAlign: "left", border: `1px solid ${C.line}`, borderRadius: 10, padding: "8px 10px", background: evaluando === s.id ? C.amberSoft : C.bg, cursor: "pointer", opacity: evaluando && evaluando !== s.id ? 0.5 : 1 }}>
                <div style={{ fontWeight: 600, fontSize: 12.5 }}>{evaluando === s.id ? "Evaluando…" : s.nombre}</div>
                <div style={{ fontSize: 10.5, color: C.inkSoft, marginTop: 1 }}>{s.fuente}{s.operativo ? " · operativo" : ""}</div>
              </button>
            ))}
          </div>
          <div style={{ fontSize: 11, fontWeight: 700, color: C.inkSoft, letterSpacing: "0.08em", margin: "14px 0 6px" }}>MOTOR DE RELEVANCIA — log</div>
          <div style={{ maxHeight: 220, overflowY: "auto", fontFamily: "ui-monospace, monospace", display: "flex", flexDirection: "column", gap: 8 }}>
            {log.length === 0 && <div style={{ fontSize: 12.5, color: C.inkSoft }}>Dispara una señal para ver: filtro → score → decisión.</div>}
            {log.map((e, i) => (
              <div key={i} style={{ borderLeft: `3px solid ${e.decision === "push" ? C.teal : e.decision === "feed" ? C.amber : e.decision === "error" ? C.coral : C.line}`, paddingLeft: 9 }}>
                <div style={{ fontSize: 10.5, color: C.inkSoft }}>{e.t} · {e.fuente}</div>
                <div style={{ fontSize: 12, fontWeight: 600 }}>{e.senal}</div>
                <div style={{ fontSize: 11.5, color: C.inkSoft, marginTop: 1 }}>{e.filtro}</div>
                {e.score !== null && e.score !== undefined && <div style={{ fontSize: 11.5, fontWeight: 700, marginTop: 1 }}>score {e.score}</div>}
                {e.razon && <div style={{ fontSize: 11.5, color: C.inkSoft, marginTop: 1 }}>{e.razon}</div>}
                <div style={{ fontSize: 11.5, fontWeight: 700, marginTop: 1, color: e.decision === "push" ? C.teal : e.decision === "feed" ? C.amber : e.decision === "error" ? C.coral : C.inkSoft }}>
                  → {e.decision === "push" ? "PUSH" : e.decision === "feed" ? "Feed" : e.decision === "error" ? "Error" : "Silencio"}
                </div>
              </div>
            ))}
          </div>
        </Sheet>
      )}
    </div>
  );
}

const devBtn = (color) => ({ width: "100%", textAlign: "left", border: `1px solid ${color}66`, borderRadius: 10, padding: "9px 11px", background: color === C.teal ? C.tealSoft : C.amberSoft, color, fontWeight: 600, fontSize: 12.5, cursor: "pointer" });

// ════════════════ SECCIONES DE PRODUCTO (Punto 3 UI) ════════════════

// Helper: reusable full-screen overlay con header y botón cerrar.
function FullScreen({ title, sub, accent, onClose, children }) {
  const c = accent || C.orange;
  return (
    <div style={{ position: "absolute", inset: 0, zIndex: 60, background: C.bg, display: "flex", flexDirection: "column", paddingTop: "env(safe-area-inset-top)" }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 16px", background: C.card, borderBottom: `1px solid ${C.line}`, flexShrink: 0 }}>
        <div>
          {sub && <div style={{ fontSize: 10.5, fontWeight: 700, color: c, letterSpacing: "0.07em" }}>{sub}</div>}
          <div style={{ fontWeight: 800, fontSize: 17, letterSpacing: "-0.02em", lineHeight: 1.15 }}>{title}</div>
        </div>
        <button onClick={onClose} style={{ border: `1px solid ${C.line}`, background: C.card, borderRadius: 999, padding: "7px 14px", fontSize: 13, fontWeight: 700, color: C.ink, cursor: "pointer", flexShrink: 0 }}>Cerrar</button>
      </div>
      <div className="no-scrollbar" style={{ flex: 1, overflowY: "auto", padding: "16px", paddingBottom: "calc(28px + env(safe-area-inset-bottom))" }}>{children}</div>
    </div>
  );
}

// Tarjeta del home: título, descripción, y opcional CTA.
function HomeCard({ icon, titulo, children, accent, onClick, cta }) {
  const c = accent || C.orange;
  return (
    <div onClick={onClick} style={{ background: C.card, border: `1px solid ${C.line}`, borderRadius: 18, padding: "15px 15px", cursor: onClick ? "pointer" : "default", position: "relative" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 9, marginBottom: 8 }}>
        <div style={{ width: 34, height: 34, borderRadius: 10, background: c === C.coral ? C.coralSoft : c === C.aqua ? C.aquaSoft : C.orangeSoft, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, flexShrink: 0 }}>{icon}</div>
        <div style={{ fontWeight: 800, fontSize: 15.5, letterSpacing: "-0.01em" }}>{titulo}</div>
        {onClick && <div style={{ marginLeft: "auto", color: C.inkSoft, fontSize: 18 }}>›</div>}
      </div>
      <div style={{ fontSize: 13.5, color: C.inkSoft, lineHeight: 1.5 }}>{children}</div>
      {cta && <div style={{ marginTop: 10, display: "inline-block", background: c, color: "#fff", borderRadius: 999, padding: "7px 14px", fontSize: 13, fontWeight: 700 }}>{cta}</div>}
    </div>
  );
}

// ── INICIO (home/dashboard) ──
function HomeView({ viaje, zonaActual, airport, diasViaje, pushDisponible, pushOn, onActivarPush, onChat, onCerca, onAirport, onPlanes, onSOS, onTraductor, onInfo }) {
  const hoy = new Date();
  const horaSaludo = hoy.getHours();
  const saludo = horaSaludo < 12 ? "Buenos días" : horaSaludo < 19 ? "Buenas tardes" : "Buenas noches";
  const proximos = (diasViaje || []).filter((d) => d.planes && d.planes.length).slice(0, 3);

  return (
    <div className="no-scrollbar" style={{ flex: 1, overflowY: "auto", padding: "16px 14px", paddingBottom: 20, display: "flex", flexDirection: "column", gap: 12 }}>
      {/* saludo + acceso al chat */}
      <div style={{ background: `linear-gradient(150deg, ${C.orange} 0%, ${C.orangeDeep} 100%)`, color: "#fff", borderRadius: 20, padding: "17px 17px" }}>
        <div style={{ fontSize: 13, opacity: 0.95, fontWeight: 600 }}>{saludo} 👋</div>
        <div style={{ fontSize: 19, fontWeight: 800, marginTop: 3, lineHeight: 1.2 }}>Tu Companion está contigo en {viaje.ciudad}</div>
        <div style={{ fontSize: 13.5, marginTop: 6, opacity: 0.95, lineHeight: 1.45 }}>Vigilo tu vuelo, el clima y la ciudad, y te aviso solo cuando algo te sirve.</div>
        <button onClick={onChat} style={{ marginTop: 12, width: "100%", background: "rgba(255,255,255,.95)", color: C.orangeDeep, border: "none", borderRadius: 12, padding: "12px 0", fontSize: 14.5, fontWeight: 800, cursor: "pointer" }}>
          💬 Pregúntame lo que sea
        </button>
      </div>

      {/* aviso para activar notificaciones (solo si está disponible y aún no activado) */}
      {pushDisponible && !pushOn && (
        <div onClick={onActivarPush} style={{ background: C.aquaSoft, border: `1px solid ${C.aqua}55`, borderRadius: 16, padding: "13px 14px", cursor: "pointer", display: "flex", alignItems: "center", gap: 11 }}>
          <span style={{ fontSize: 22 }}>🔔</span>
          <span style={{ flex: 1 }}>
            <span style={{ fontWeight: 800, fontSize: 14, display: "block", color: C.aqua }}>Activa las notificaciones</span>
            <span style={{ fontSize: 12.5, color: C.inkSoft, lineHeight: 1.4 }}>Para avisarte de tu vuelo, el clima y lo que pasa cerca, aunque tengas la app cerrada.</span>
          </span>
          <span style={{ background: C.aqua, color: "#fff", borderRadius: 999, padding: "7px 13px", fontSize: 12.5, fontWeight: 700, flexShrink: 0 }}>Activar</span>
        </div>
      )}

      {/* guía aeropuerto, si aplica */}
      {airport && airport.disponible && (
        <HomeCard icon="🛬" titulo="Guía de llegada al aeropuerto" accent={C.orange} onClick={onAirport} cta="Abrir guía paso a paso">
          Te guío para salir de {airport.name} sin perderte ni que te cobren de más: migración, equipaje y transporte seguro.
        </HomeCard>
      )}

      {/* qué hay cerca */}
      <HomeCard icon="📍" titulo="Qué hay cerca de mí ahora" accent={C.aqua} onClick={onCerca} cta="Ver lugares cerca">
        Estás cerca de <b style={{ color: C.ink }}>{zonaActual}</b>. Te muestro lugares curados ordenados por distancia real, con cómo llegar.
      </HomeCard>

      {/* próximos planes */}
      <HomeCard icon="🗓" titulo="Tus próximos días" accent={C.orange} onClick={onPlanes} cta="Ver mi calendario">
        {proximos.length
          ? <>Tienes {proximos.length === 1 ? "un plan próximo" : "planes próximos"}. Toca para ver tu viaje día por día.</>
          : <>Aún no me has contado tus planes. Cuéntamelos en el chat y los organizo en tu calendario.</>}
      </HomeCard>

      {/* accesos rápidos */}
      <div style={{ fontSize: 11.5, fontWeight: 700, color: C.inkSoft, letterSpacing: "0.07em", margin: "4px 2px 0" }}>SIEMPRE A LA MANO</div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
        <button onClick={onSOS} style={{ background: C.coralSoft, border: `1px solid ${C.coral}55`, borderRadius: 16, padding: "14px 12px", cursor: "pointer", textAlign: "left" }}>
          <div style={{ fontSize: 22 }}>🆘</div>
          <div style={{ fontWeight: 800, fontSize: 14, color: C.coral, marginTop: 5 }}>SOS del viajero</div>
          <div style={{ fontSize: 11.5, color: C.inkSoft, marginTop: 2, lineHeight: 1.35 }}>Ayuda inmediata si algo sale mal</div>
        </button>
        <button onClick={onTraductor} style={{ background: C.aquaSoft, border: `1px solid ${C.aqua}55`, borderRadius: 16, padding: "14px 12px", cursor: "pointer", textAlign: "left" }}>
          <div style={{ fontSize: 22 }}>🗣</div>
          <div style={{ fontWeight: 800, fontSize: 14, color: C.aqua, marginTop: 5 }}>Traductor</div>
          <div style={{ fontSize: 11.5, color: C.inkSoft, marginTop: 2, lineHeight: 1.35 }}>Frases clave según la situación</div>
        </button>
      </div>
      <button onClick={onInfo} style={{ background: C.card, border: `1px solid ${C.line}`, borderRadius: 16, padding: "13px 14px", cursor: "pointer", textAlign: "left", display: "flex", alignItems: "center", gap: 10 }}>
        <span style={{ fontSize: 20 }}>ℹ️</span>
        <span style={{ flex: 1 }}>
          <span style={{ fontWeight: 800, fontSize: 14, display: "block" }}>Info útil de {viaje.ciudad}</span>
          <span style={{ fontSize: 11.5, color: C.inkSoft }}>Emergencias, transporte, propinas, lo básico</span>
        </span>
        <span style={{ color: C.inkSoft, fontSize: 18 }}>›</span>
      </button>
    </div>
  );
}

// ── PLANES (calendario del viaje) ──
function PlanesView({ viaje, diasViaje, onChat }) {
  const fmtDia = (d) => d.toLocaleDateString("es-CO", { weekday: "short" }).replace(".", "");
  const hoyISO = new Date().toISOString().slice(0, 10);
  return (
    <div className="no-scrollbar" style={{ flex: 1, overflowY: "auto", padding: "16px 14px", paddingBottom: 20 }}>
      <div style={{ fontSize: 19, fontWeight: 800, letterSpacing: "-0.02em" }}>Tu viaje día por día</div>
      <div style={{ fontSize: 13, color: C.inkSoft, marginTop: 3 }}>{viaje.ciudad} · {(diasViaje || []).length} días</div>

      <div style={{ marginTop: 16, display: "flex", flexDirection: "column", gap: 10 }}>
        {(diasViaje || []).map((d, i) => {
          const esHoy = d.iso === hoyISO;
          return (
            <div key={d.iso} style={{ display: "flex", gap: 12 }}>
              <div style={{ display: "flex", flexDirection: "column", alignItems: "center", width: 46, flexShrink: 0 }}>
                <div style={{ fontSize: 11, color: esHoy ? C.orange : C.inkSoft, fontWeight: 700, textTransform: "uppercase" }}>{fmtDia(d.date)}</div>
                <div style={{ width: 38, height: 38, borderRadius: 999, background: esHoy ? C.orange : C.card, color: esHoy ? "#fff" : C.ink, border: `1.5px solid ${esHoy ? C.orange : C.line}`, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: 15, marginTop: 3 }}>{d.date.getDate()}</div>
              </div>
              <div style={{ flex: 1, background: C.card, border: `1px solid ${esHoy ? C.orange + "55" : C.line}`, borderRadius: 14, padding: "11px 13px", minHeight: 44 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: esHoy ? C.orange : C.inkSoft }}>
                  {i === 0 ? "Llegada" : i === (diasViaje.length - 1) ? "Regreso" : `Día ${i + 1}`}{esHoy ? " · hoy" : ""}
                </div>
                {d.planes && d.planes.length
                  ? <div style={{ marginTop: 6, display: "flex", flexDirection: "column", gap: 5 }}>
                      {d.planes.map((p, k) => (
                        <div key={k} style={{ fontSize: 13.5, color: C.ink, display: "flex", gap: 6, lineHeight: 1.4 }}><span style={{ color: C.orange }}>•</span><span>{p}</span></div>
                      ))}
                    </div>
                  : <div style={{ marginTop: 6, fontSize: 13, color: C.inkSoft, fontStyle: "italic" }}>Sin planes aún</div>}
              </div>
            </div>
          );
        })}
      </div>

      <button onClick={onChat} style={{ marginTop: 18, width: "100%", background: C.orangeSoft, border: `1px solid ${C.orange}55`, color: C.orangeDeep, borderRadius: 14, padding: "13px 0", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>
        💬 Contarle un plan al Companion
      </button>
      <div style={{ fontSize: 12, color: C.inkSoft, textAlign: "center", marginTop: 10, lineHeight: 1.45 }}>
        Cuéntale tus planes al Companion en el chat y aparecerán aquí, ordenados por día.
      </div>
    </div>
  );
}

// ── MÁS (info útil, documentos, ajustes) ──
function MasView({ viaje, docs, vozActiva, onToggleVoz, onUbicacion, onInfo, onDocs, onSOS, onTraductor, onReiniciar, onDev, debug, pushDisponible, pushOn, onTogglePush }) {
  const Item = ({ icon, label, sub, onClick, danger }) => (
    <button onClick={onClick} style={{ width: "100%", display: "flex", alignItems: "center", gap: 12, padding: "14px 14px", background: C.card, border: `1px solid ${C.line}`, borderRadius: 14, cursor: "pointer", textAlign: "left" }}>
      <span style={{ fontSize: 19, width: 24, textAlign: "center", flexShrink: 0 }}>{icon}</span>
      <span style={{ flex: 1 }}>
        <span style={{ fontWeight: 700, fontSize: 14.5, color: danger ? C.coral : C.ink, display: "block" }}>{label}</span>
        {sub && <span style={{ fontSize: 12, color: C.inkSoft }}>{sub}</span>}
      </span>
      <span style={{ color: C.inkSoft, fontSize: 18 }}>›</span>
    </button>
  );
  return (
    <div className="no-scrollbar" style={{ flex: 1, overflowY: "auto", padding: "16px 14px", paddingBottom: 20 }}>
      <div style={{ fontSize: 19, fontWeight: 800, letterSpacing: "-0.02em", marginBottom: 14 }}>Más</div>
      <div style={{ fontSize: 11.5, fontWeight: 700, color: C.inkSoft, letterSpacing: "0.07em", margin: "0 2px 8px" }}>TU DESTINO</div>
      <div style={{ display: "flex", flexDirection: "column", gap: 9 }}>
        <Item icon="ℹ️" label={`Info útil de ${viaje.ciudad}`} sub="Emergencias, transporte, propinas, lo básico" onClick={onInfo} />
        <Item icon="🗣" label="Traductor de bolsillo" sub="Frases clave según la situación" onClick={onTraductor} />
        <Item icon="🆘" label="SOS del viajero" sub="Ayuda inmediata si algo sale mal" onClick={onSOS} danger />
      </div>

      <div style={{ fontSize: 11.5, fontWeight: 700, color: C.inkSoft, letterSpacing: "0.07em", margin: "18px 2px 8px" }}>TU VIAJE</div>
      <div style={{ display: "flex", flexDirection: "column", gap: 9 }}>
        <Item icon="📄" label="Mis documentos" sub={docs.length ? `${docs.length} confirmación(es) guardada(s)` : "Vuelos, hotel, reservas"} onClick={onDocs} />
        <Item icon="🧭" label="Mi ubicación / GPS" sub="Cambiar zona o reactivar GPS" onClick={onUbicacion} />
        {pushDisponible && <Item icon={pushOn ? "🔔" : "🔕"} label={`Notificaciones: ${pushOn ? "activadas" : "desactivadas"}`} sub={pushOn ? "Te aviso aunque la app esté cerrada" : "Actívalas para no perderte nada"} onClick={onTogglePush} />}
        <Item icon={vozActiva ? "🔊" : "🔈"} label={`Leer en voz alta: ${vozActiva ? "activado" : "desactivado"}`} onClick={onToggleVoz} />
      </div>

      <div style={{ fontSize: 11.5, fontWeight: 700, color: C.inkSoft, letterSpacing: "0.07em", margin: "18px 2px 8px" }}>CUENTA</div>
      <div style={{ display: "flex", flexDirection: "column", gap: 9 }}>
        {debug && <Item icon="🛠" label="Panel de desarrollo" onClick={onDev} />}
        <Item icon="↺" label="Reiniciar con otro viaje" onClick={onReiniciar} danger />
      </div>
      <div style={{ textAlign: "center", marginTop: 22, fontSize: 11.5, color: C.inkSoft }}>Voyra · tu Companion de viaje</div>
    </div>
  );
}

// ── SOS DEL VIAJERO ──
function SosView({ viaje, zonaActual, gpsEstado, coords, onClose, onChat }) {
  const guias = [
    { icon: "🧭", t: "Estoy perdido(a)", pasos: ["Quédate en un lugar seguro y concurrido (un café, una tienda).", "Comparte tu ubicación de abajo o muéstrala a alguien de confianza.", "Pide un taxi por app a tu hotel — no preguntes a desconocidos en la calle.", "Escríbele al Companion: te guío de vuelta paso a paso."] },
    { icon: "💳", t: "Me robaron", pasos: ["No te resistas — tu seguridad vale más que cualquier cosa.", "Ponte a salvo y llama al 123.", "Bloquea tus tarjetas llamando a tu banco de inmediato.", "Denuncia en línea en 'A Denunciar' de la Policía o en un CAI cercano."] },
    { icon: "🏥", t: "Emergencia médica", pasos: ["Llama al 123 (o 132 ambulancia).", "Si puedes, di tu ubicación exacta (mírala abajo).", "Usa las frases de salud del traductor para comunicarte.", "Si es grave, no te muevas y espera ayuda."] },
    { icon: "🗣", t: "No me entienden", pasos: ["Abre el Traductor de bolsillo y muestra la frase.", "Habla despacio y con gestos.", "Pídele al Companion que te traduzca algo específico."] },
  ];
  const [abierto, setAbierto] = React.useState(null);

  return (

      {/* qué hacer según el caso */}
      <div style={{ fontSize: 11.5, fontWeight: 700, color: C.inkSoft, letterSpacing: "0.07em", margin: "18px 2px 10px" }}>¿QUÉ ESTÁ PASANDO?</div>
      <div style={{ display: "flex", flexDirection: "column", gap: 9 }}>

        💬 Hablar con mi Companion ahora
      </button>

}

// ── TRADUCTOR DE BOLSILLO ──
function TraductorView({ onClose }) {
  const cats = Object.keys(FRASES);
  const [cat, setCat] = React.useState(cats[0]);
  const [copiado, setCopiado] = React.useState(null);
  const decir = (texto, lang) => { try { const u = new SpeechSynthesisUtterance(texto); u.lang = lang; window.speechSynthesis && window.speechSynthesis.speak(u); } catch (e) {} };
  const copiar = (texto, i) => { try { navigator.clipboard.writeText(texto); setCopiado(i); setTimeout(() => setCopiado(null), 1200); } catch (e) {} };
  return (
    <FullScreen title="Traductor de bolsillo" sub="FRASES CLAVE · ES → EN" accent={C.aqua} onClose={onClose}>
      <div className="no-scrollbar" style={{ display: "flex", gap: 7, overflowX: "auto", paddingBottom: 4 }}>
        {cats.map((c) => (
          <button key={c} onClick={() => setCat(c)} style={{ flexShrink: 0, fontSize: 13, fontWeight: 700, padding: "7px 14px", borderRadius: 999, border: `1px solid ${cat === c ? C.aqua : C.line}`, background: cat === c ? C.aqua : C.card, color: cat === c ? "#fff" : C.inkSoft, cursor: "pointer" }}>{c}</button>
        ))}
      </div>
      <div style={{ marginTop: 12, display: "flex", flexDirection: "column", gap: 10 }}>
        {FRASES[cat].map((f, i) => (
          <div key={i} style={{ background: C.card, border: `1px solid ${C.line}`, borderRadius: 14, padding: "13px 14px" }}>
            <div style={{ fontSize: 15, fontWeight: 700, color: C.ink }}>{f.es}</div>
            <div style={{ fontSize: 14, color: C.aqua, marginTop: 3, fontWeight: 600 }}>{f.en}</div>
            <div style={{ display: "flex", gap: 8, marginTop: 9 }}>
              <button onClick={() => decir(f.en, "en-US")} style={{ background: C.aquaSoft, border: `1px solid ${C.aqua}55`, color: C.aqua, borderRadius: 999, padding: "6px 13px", fontSize: 12.5, fontWeight: 700, cursor: "pointer" }}>🔊 Escuchar</button>
              <button onClick={() => copiar(f.en, i)} style={{ background: C.bg, border: `1px solid ${C.line}`, color: C.inkSoft, borderRadius: 999, padding: "6px 13px", fontSize: 12.5, fontWeight: 700, cursor: "pointer" }}>{copiado === i ? "✓ Copiado" : "Copiar"}</button>
            </div>
          </div>
        ))}
      </div>
      <div style={{ fontSize: 12, color: C.inkSoft, textAlign: "center", marginTop: 16, lineHeight: 1.45 }}>
        ¿Necesitas una frase que no está aquí? Pídesela al Companion en el chat.
      </div>
    </FullScreen>
  );
}

// Bottom sheet reutilizable
// Modo aeropuerto: timeline de llegada paso a paso + transporte con tips anti-estafa
function AirportView({ data, onClose }) {
  const icon = { passport: "🛂", luggage: "🧳", customs: "🛃", exit: "🚪" };
  const seg = { alta: C.aqua, media: C.amber, baja: C.coral };
  const fmt = (e) => !e ? "" : e[0] === e[1] ? `~${e[0]} min` : `${e[0]}–${e[1]} min`;
  return (
    <div style={{ position: "absolute", inset: 0, zIndex: 60, background: C.bg, display: "flex", flexDirection: "column", paddingTop: "env(safe-area-inset-top)" }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 16px", background: C.card, borderBottom: `1px solid ${C.line}` }}>
        <div>
          <div style={{ fontSize: 10.5, fontWeight: 700, color: C.orange, letterSpacing: "0.07em" }}>MODO LLEGADA · {data.code}</div>
          <div style={{ fontWeight: 800, fontSize: 17, letterSpacing: "-0.02em", lineHeight: 1.15 }}>Acabas de aterrizar</div>
        </div>
        <button onClick={onClose} style={{ border: `1px solid ${C.line}`, background: C.card, borderRadius: 999, padding: "7px 13px", fontSize: 13, fontWeight: 600, color: C.ink, cursor: "pointer" }}>Abrir chat</button>
      </div>

      <div className="no-scrollbar" style={{ flex: 1, overflowY: "auto", padding: "16px", paddingBottom: "calc(24px + env(safe-area-inset-bottom))" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 9, marginBottom: 4 }}>
          <Mark size={34} />
          <div style={{ fontSize: 14, color: C.ink, lineHeight: 1.35 }}>
            Estoy contigo en <b>{data.name}</b>. Sígueme paso a paso y sales sin enredos.
            {data.tiempo_total_estimado_min ? <span style={{ color: C.inkSoft }}> Estimado hasta la salida: <b style={{ color: C.ink }}>~{data.tiempo_total_estimado_min} min</b>{data.tiempos_modo === "en_vivo" ? " (en vivo)" : ""}.</span> : null}
          </div>
        </div>

        {/* Timeline */}
        <div style={{ marginTop: 14 }}>
          {data.pasos.map((p, i) => (
            <div key={p.id} style={{ display: "flex", gap: 12 }}>
              <div style={{ display: "flex", flexDirection: "column", alignItems: "center" }}>
                <div style={{ width: 38, height: 38, borderRadius: 999, background: C.orangeSoft, border: `1px solid ${C.orange}55`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, flexShrink: 0 }}>{icon[p.icono] || "•"}</div>
                {i < data.pasos.length - 1 && <div style={{ flex: 1, width: 2, background: C.line, margin: "4px 0" }} />}
              </div>
              <div style={{ flex: 1, paddingBottom: 18 }}>
                <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", gap: 8 }}>
                  <div style={{ fontWeight: 700, fontSize: 15 }}>{p.titulo}</div>
                  {p.estimado_min && <div style={{ fontSize: 12, fontWeight: 600, color: p.estimado_fuente === "en_vivo" ? C.aqua : C.inkSoft, whiteSpace: "nowrap" }}>{fmt(p.estimado_min)}{p.estimado_fuente === "en_vivo" ? " · en vivo" : ""}</div>}
                </div>
                <div style={{ fontSize: 13.5, color: C.ink, marginTop: 3, lineHeight: 1.45 }}>{p.que_hacer}</div>
                {p.tips && p.tips.length > 0 && (
                  <div style={{ marginTop: 8, background: C.card, border: `1px solid ${C.line}`, borderRadius: 12, padding: "9px 11px", display: "flex", flexDirection: "column", gap: 6 }}>
                    {p.tips.map((t, j) => (
                      <div key={j} style={{ fontSize: 12.5, color: C.inkSoft, lineHeight: 1.4, display: "flex", gap: 6 }}><span style={{ color: C.orange }}>›</span><span>{t}</span></div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          ))}
        </div>

        {/* Transporte */}
        <div style={{ fontSize: 11, fontWeight: 700, color: C.inkSoft, letterSpacing: "0.08em", margin: "4px 0 10px" }}>CÓMO SALIR DEL AEROPUERTO</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {data.transporte.map((t) => (
            <div key={t.id} style={{ background: C.card, border: `1px solid ${t.recomendado ? C.orange + "55" : C.line}`, borderLeft: `3px solid ${seg[t.seguridad] || C.line}`, borderRadius: 14, padding: "12px 13px" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                <div style={{ fontWeight: 700, fontSize: 14.5 }}>{t.nombre}</div>
                {t.recomendado && <span style={{ fontSize: 10.5, fontWeight: 700, color: C.orange, background: C.orangeSoft, borderRadius: 999, padding: "2px 8px" }}>RECOMENDADO</span>}
              </div>
              <div style={{ fontSize: 13.5, color: C.ink, marginTop: 5, lineHeight: 1.45 }}>{t.como}</div>
              {t.precio_aprox && <div style={{ fontSize: 12.5, color: C.inkSoft, marginTop: 5 }}>💵 {t.precio_aprox}</div>}
              {t.tip && <div style={{ fontSize: 12.5, color: C.ink, marginTop: 7, background: C.orangeSoft, borderRadius: 10, padding: "8px 10px", lineHeight: 1.4 }}>💡 {t.tip}</div>}
            </div>
          ))}
        </div>

        {data.emergency && <div style={{ fontSize: 12, color: C.inkSoft, textAlign: "center", marginTop: 16 }}>Emergencias en Colombia: <b style={{ color: C.coral }}>{data.emergency}</b></div>}
      </div>
    </div>
  );
}
